<title>Gotita y Lavame x Fa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c; --panel:#16181f; --ink:#eef2f8; --muted:#9aa6b8;
    --cyan:#35d0ff; --blue:#1f8fff; --gold:#FFC83D; --pink:#FF5C8A; --green:#4ADE80;
    --font:"Fredoka","Baloo 2",-apple-system,"Segoe UI Rounded","Arial Rounded MT Bold",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:var(--font);color:var(--ink);
    background:radial-gradient(circle at 50% 0%,#15171f 0%,#0a0a0c 60%);
    -webkit-user-select:none;user-select:none;touch-action:manipulation;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;}

  #top{width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;
    padding:8px 12px 2px;gap:8px;z-index:5;flex-wrap:wrap;}
  .brandbox{display:flex;align-items:center;gap:6px;}
  .logo{height:clamp(30px,7vw,46px);width:auto;border-radius:9px;display:block;}
  .enseco{background:linear-gradient(90deg,var(--cyan),var(--blue));color:#04121c;font-weight:700;
    font-size:11px;padding:3px 8px;border-radius:10px;white-space:nowrap;}
  .scoreboard{display:flex;gap:6px;}
  .stat{background:var(--panel);border:1px solid #262a34;border-radius:14px;padding:5px 9px;min-width:50px;text-align:center;}
  .stat .n{font-weight:700;font-size:clamp(15px,3.6vw,20px);line-height:1;color:var(--cyan);}
  .stat .l{font-size:9px;font-weight:600;color:var(--muted);}
  #sound{background:var(--panel);border:1px solid #262a34;border-radius:13px;font-size:18px;width:40px;height:40px;
    color:var(--ink);cursor:pointer;flex:none;}

  #stage{position:relative;width:100%;max-width:900px;flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:2px 10px 6px;}
  #washWrap{position:relative;width:min(92vw,620px);aspect-ratio:5/3.3;
    background:radial-gradient(circle at 50% 35%,#252a36 0%,#101218 70%);
    border-radius:26px;box-shadow:inset 0 0 40px rgba(0,0,0,.6),0 8px 30px rgba(0,0,0,.5);
    overflow:hidden;border:1px solid #2a2f3b;}
  #washWrap canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #carCanvas{z-index:1;} #gritCanvas{z-index:2;touch-action:none;}
  #floor{position:absolute;left:0;right:0;bottom:0;height:20%;
    background:linear-gradient(#2a2f3b,#15171d);z-index:0;}
  #spot{position:absolute;left:50%;top:-10%;width:120%;height:80%;transform:translateX(-50%);
    background:radial-gradient(ellipse at center,rgba(53,208,255,.10),transparent 60%);z-index:0;pointer-events:none;}
  #wmlogo{position:absolute;right:8px;bottom:6px;height:24px;opacity:.5;z-index:3;border-radius:5px;pointer-events:none;}

  #gotita{position:relative;margin-top:-4px;display:flex;align-items:flex-end;gap:8px;width:min(92vw,620px);z-index:4;}
  #drop{width:clamp(50px,12vw,76px);flex:none;animation:bob 1.8s ease-in-out infinite;transform-origin:bottom center;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-8px) rotate(2deg);}}
  #bubble{background:var(--panel);border:1px solid #2a2f3b;border-radius:18px;padding:9px 13px;flex:1;position:relative;
    font-weight:600;font-size:clamp(13px,3.4vw,17px);min-height:44px;display:flex;align-items:center;color:var(--ink);}
  #bubble::before{content:"";position:absolute;left:-11px;bottom:14px;border:8px solid transparent;border-right-color:var(--panel);}

  #tray{display:flex;gap:8px;justify-content:center;margin-top:8px;flex-wrap:wrap;width:min(92vw,620px);z-index:4;}
  .cloth{background:var(--panel);border:3px solid #2a2f3b;border-radius:16px;padding:6px 8px;min-width:64px;text-align:center;
    cursor:pointer;transition:transform .08s;}
  .cloth:active{transform:translateY(3px);}
  .cloth .sw{width:34px;height:24px;border-radius:7px;margin:0 auto 3px;border:1px solid rgba(255,255,255,.15);}
  .cloth .cn{font-size:11px;font-weight:700;line-height:1.05;color:var(--ink);}
  .cloth.active{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 0 14px rgba(255,200,61,.5);}
  .cloth.need{animation:needp 1s ease infinite;}
  @keyframes needp{0%,100%{box-shadow:0 0 0 rgba(53,208,255,0);}50%{box-shadow:0 0 0 4px var(--cyan);}}

  #controls{width:min(92vw,620px);display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center;z-index:4;padding-bottom:6px;min-height:8px;}
  .btn{border:none;border-radius:20px;padding:13px 18px;font-family:var(--font);font-weight:700;
    font-size:clamp(15px,3.8vw,19px);cursor:pointer;transition:transform .06s,filter .06s;display:flex;align-items:center;gap:8px;color:#04121c;}
  .btn:active{transform:translateY(3px);filter:brightness(1.1);}
  .btn.main{background:linear-gradient(90deg,var(--gold),#ff9d2f);}
  .btn.go{background:linear-gradient(90deg,var(--green),#22b86a);}
  .btn.ghost{background:var(--panel);color:var(--cyan);border:1px solid #2a2f3b;}

  #links{width:100%;text-align:center;font-size:clamp(11px,3vw,14px);font-weight:600;color:var(--muted);text-decoration:none;padding:4px 0 8px;z-index:5;}
  #links a,#links{color:var(--muted);}

  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:30;text-align:center;padding:24px;background:radial-gradient(circle at 50% 20%,#15171f,#070708 70%);}
  .screen.over{background:rgba(7,7,8,.92);}
  .screen h1{font-size:clamp(28px,7.5vw,46px);margin:4px 0;color:var(--ink);line-height:1;}
  .screen h1 b{color:var(--cyan);}
  .screen .tag{background:linear-gradient(90deg,var(--cyan),var(--blue));color:#04121c;font-weight:700;
    padding:6px 14px;border-radius:14px;font-size:clamp(13px,3.6vw,17px);margin:6px 0;}
  .screen p{font-size:clamp(15px,3.8vw,19px);font-weight:600;max-width:440px;margin:8px 0 16px;color:var(--ink);}
  .screen .lvlnum{font-size:clamp(44px,14vw,90px);color:var(--gold);line-height:1;margin:6px;}
  .logoBig{width:clamp(150px,42vw,250px);border-radius:16px;margin-bottom:8px;}
  .startlinks{color:var(--cyan);font-weight:700;text-decoration:none;margin-top:14px;font-size:15px;
    background:var(--panel);border:1px solid #2a2f3b;padding:6px 16px;border-radius:14px;}
  .opts{display:flex;flex-direction:column;gap:10px;width:min(86vw,360px);margin-top:6px;}
  .opt{background:var(--panel);border:2px solid #2a2f3b;color:var(--ink);border-radius:16px;padding:14px;
    font-family:var(--font);font-weight:700;font-size:clamp(15px,4vw,19px);cursor:pointer;}
  .opt:active{transform:translateY(2px);}
  .opt.ok{border-color:var(--green);background:rgba(74,222,128,.15);}
  .opt.bad{border-color:var(--pink);background:rgba(255,92,138,.15);}
  .hidden{display:none!important;}

  .confetti{position:fixed;top:-40px;font-size:28px;z-index:40;pointer-events:none;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.9;}}
  .partLabel{position:absolute;background:var(--gold);color:#3a2a00;font-weight:700;padding:4px 10px;border-radius:12px;
    font-size:13px;z-index:3;transform:translate(-50%,-50%);pointer-events:none;animation:popl .3s ease;}
  @keyframes popl{from{transform:translate(-50%,-50%) scale(.3);}to{transform:translate(-50%,-50%) scale(1);}}

  @media (prefers-reduced-motion: reduce){#drop,.logoBig{animation:none;}}
</style>
</head>
<body>
<div id="app">

  function cheer(){ [523,659,784,1046].forEach(function(f,i){ setTimeout(function(){tone(f,.18,'triangle',.16);},i*100); }); }
  function ding(){ tone(880,.12,'triangle',.16); setTimeout(function(){tone(1320,.16,'triangle',.16);},120); }

  function pickVoice(){ try{ var vs=speechSynthesis.getVoices(); if(!vs.length)return;
      var es=vs.filter(function(v){return /^es/i.test(v.lang)&&!/^pt/i.test(v.lang);});
      var pref=['es-CL','es-419','es-MX','es-US','es-ES'];
      for(var i=0;i<pref.length;i++){ var m=es.filter(function(v){return v.lang.toLowerCase()===pref[i].toLowerCase();});
        if(m.length){ esVoice=femaleFirst(m); return; } }
      if(es.length){ esVoice=femaleFirst(es); } }catch(e){} }
  function femaleFirst(list){ var f=list.filter(function(v){return /m[oó]nica|paulina|female|mujer|google|luciana|esperanza/i.test(v.name);});
    return (f[0]||list[0]); }
  if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
  function speak(t){ if(!soundOn||!('speechSynthesis' in window))return;
    try{ speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(t.replace(/[\u{1F300}-\u{1FAFF}\u2600-\u27BF\u2190-\u21FF]/gu,''));
      u.voice=esVoice||null; u.lang=(esVoice&&esVoice.lang)||'es-MX'; u.rate=1.02; u.pitch=1.6; /* tono de niño */
      speechSynthesis.speak(u); }catch(e){} }

  document.getElementById('sound').addEventListener('click',function(){
    soundOn=!soundOn; this.textContent=soundOn?'🔊':'🔇';
    if(soundOn){ac();pop();} else if('speechSynthesis' in window){try{speechSynthesis.cancel();}catch(e){}} });

  /* ---------- Save ---------- */
  function save(){ try{ localStorage.setItem('lxf_v2',JSON.stringify({total:totalCars,level:level,best:bestScore})); }catch(e){} }
  function load(){ try{ var s=localStorage.getItem('lxf_v2'); if(s)return JSON.parse(s); }catch(e){} return null; }

  /* ---------- Canvas ---------- */
  var wrap=document.getElementById('washWrap');
  var carC=document.getElementById('carCanvas'), gritC=document.getElementById('gritCanvas');
  var carX=carC.getContext('2d'), gritX=gritC.getContext('2d');
  var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
  function resize(){ var r=wrap.getBoundingClientRect(); W=r.width; H=r.height;
    [carC,gritC].forEach(function(cv){ cv.width=W*DPR; cv.height=H*DPR; cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0); });
    drawCar(); if(phase==='play') buildStage(stageIndex,true); }

  /* ---------- Vehicles ---------- */
  var COLORS=['#E53935','#1E88E5','#43A047','#FB8C00','#8E24AA','#00ACC1','#FDD835','#EC407A','#7E57C2','#FF7043'];
  var carColor='#E53935', polished=false, geom=null, vehType='citadino';
  function addRR(c,x,y,w,h,r){ c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); }
  function shadow(){ carX.fillStyle='rgba(0,0,0,.4)'; carX.beginPath(); carX.ellipse(W/2,H*0.80,W*0.40,H*0.045,0,0,7); carX.fill(); }
  function wheel(x,y,r){ carX.fillStyle='#16181d'; carX.beginPath(); carX.arc(x,y,r,0,7); carX.fill();
    carX.fillStyle='#9aa6b8'; carX.beginPath(); carX.arc(x,y,r*0.45,0,7); carX.fill();
    carX.fillStyle='#16181d'; carX.beginPath(); carX.arc(x,y,r*0.16,0,7); carX.fill(); }
  function shineStreak(x1,y1,x2,y2){ carX.strokeStyle='rgba(255,255,255,.9)'; carX.lineCap='round';
    carX.lineWidth=5; carX.beginPath(); carX.moveTo(x1,y1); carX.lineTo(x2,y2); carX.stroke(); }
  function glassFill(){ return '#bfe9ff'; }

  function drawCar(){
    carX.clearRect(0,0,W,H); shadow();
    if(vehType==='deportivo') vDeportivo();
    else if(vehType==='camioneta') vCamioneta();
    else if(vehType==='van') vVan();

  }

  function vCitadino(){
    var cw=W*0.60,ch=H*0.26,cx=(W-cw)/2,by=H*0.50, rTop=by-ch*0.85, ground=by+ch;
    var path=function(c){ c.beginPath(); addRR(c,cx,by-ch*0.05,cw,ch*1.05,ch*0.45);
      c.moveTo(cx+cw*0.24,by); c.quadraticCurveTo(cx+cw*0.30,rTop,cx+cw*0.46,rTop);
      c.lineTo(cx+cw*0.64,rTop); c.quadraticCurveTo(cx+cw*0.74,rTop,cx+cw*0.78,by); c.closePath(); };
    carX.fillStyle=carColor; path(carX); carX.fill();
    carX.fillStyle=glassFill();
    carX.beginPath(); carX.moveTo(cx+cw*0.28,by-ch*0.1); carX.quadraticCurveTo(cx+cw*0.33,rTop+ch*0.1,cx+cw*0.46,rTop+ch*0.1);
    carX.lineTo(cx+cw*0.46,by-ch*0.1); carX.closePath(); carX.fill();
    carX.beginPath(); carX.moveTo(cx+cw*0.50,rTop+ch*0.1); carX.lineTo(cx+cw*0.62,rTop+ch*0.1);
    carX.quadraticCurveTo(cx+cw*0.70,rTop+ch*0.1,cx+cw*0.74,by-ch*0.1); carX.lineTo(cx+cw*0.50,by-ch*0.1); carX.closePath(); carX.fill();
    carX.fillStyle='#FFF3B0'; carX.beginPath(); carX.ellipse(cx+cw-4,by+ch*0.2,cw*0.025,ch*0.22,0,0,7); carX.fill();
    var w1=cx+cw*0.24,w2=cx+cw*0.78,wr=ch*0.42; wheel(w1,ground,wr); wheel(w2,ground,wr);
    if(polished){ shineStreak(cx+cw*0.30,by-ch*0.2,cx+cw*0.42,by-ch*0.3); carX.lineWidth=3; shineStreak(cx+cw*0.30,by+ch*0.1,cx+cw*0.40,by+ch*0.05); }
    geom={pathFn:path, glass:[[cx+cw*0.27,rTop,cw*0.5,ch*0.55]], wheels:[[w1,ground,wr],[w2,ground,wr]]};
  }
  function vDeportivo(){
    var cw=W*0.72,ch=H*0.18,cx=(W-cw)/2,by=H*0.54, rTop=by-ch*1.1, ground=by+ch;
    var path=function(c){ c.beginPath(); addRR(c,cx,by-ch*0.1,cw,ch*1.1,ch*0.7);
      c.moveTo(cx+cw*0.30,by-ch*0.3); c.quadraticCurveTo(cx+cw*0.40,rTop,cx+cw*0.56,rTop);
      c.lineTo(cx+cw*0.60,rTop); c.quadraticCurveTo(cx+cw*0.74,rTop+ch*0.1,cx+cw*0.80,by-ch*0.3); c.closePath(); };
    carX.fillStyle=carColor; path(carX); carX.fill();
    carX.fillStyle=glassFill();
    carX.beginPath(); carX.moveTo(cx+cw*0.34,by-ch*0.35); carX.quadraticCurveTo(cx+cw*0.42,rTop+ch*0.15,cx+cw*0.58,rTop+ch*0.15);
    carX.quadraticCurveTo(cx+cw*0.70,rTop+ch*0.2,cx+cw*0.74,by-ch*0.35); carX.closePath(); carX.fill();
    carX.fillStyle='#FFF3B0'; carX.beginPath(); carX.ellipse(cx+cw-3,by+ch*0.1,cw*0.02,ch*0.4,0,0,7); carX.fill();
    carX.fillStyle='rgba(0,0,0,.25)'; carX.fillRect(cx+cw*0.05,by+ch*0.6,cw*0.9,ch*0.12);
    var w1=cx+cw*0.20,w2=cx+cw*0.80,wr=ch*0.62; wheel(w1,ground,wr); wheel(w2,ground,wr);
    if(polished){ shineStreak(cx+cw*0.34,by-ch*0.4,cx+cw*0.5,by-ch*0.55); carX.lineWidth=3; shineStreak(cx+cw*0.34,by+ch*0.1,cx+cw*0.46,by); }
    geom={pathFn:path, glass:[[cx+cw*0.32,rTop,cw*0.45,ch*0.9]], wheels:[[w1,ground,wr],[w2,ground,wr]]};
  }
  function vCamioneta(){
    var cw=W*0.70,ch=H*0.28,cx=(W-cw)/2,by=H*0.48, rTop=by-ch*0.75, ground=by+ch;
    var path=function(c){ c.beginPath(); addRR(c,cx,by,cw,ch,ch*0.30);
      c.moveTo(cx+cw*0.06,by); c.lineTo(cx+cw*0.10,rTop); c.lineTo(cx+cw*0.42,rTop);
      c.lineTo(cx+cw*0.46,by); c.closePath(); };
    carX.fillStyle=carColor; path(carX); carX.fill();
    carX.fillStyle='rgba(0,0,0,.22)'; carX.fillRect(cx+cw*0.5,by+ch*0.18,cw*0.46,ch*0.5); // bed
    carX.fillStyle=glassFill();
    carX.fillRect(cx+cw*0.13,rTop+ch*0.08,cw*0.13,ch*0.5);
    carX.fillRect(cx+cw*0.28,rTop+ch*0.08,cw*0.12,ch*0.5);
    carX.fillStyle='#FFF3B0'; carX.beginPath(); carX.ellipse(cx+cw*0.04,by+ch*0.35,cw*0.02,ch*0.2,0,0,7); carX.fill();
    var w1=cx+cw*0.20,w2=cx+cw*0.82,wr=ch*0.40; wheel(w1,ground,wr); wheel(w2,ground,wr);
    if(polished){ shineStreak(cx+cw*0.55,by+ch*0.05,cx+cw*0.7,by+ch*0.05); }
    geom={pathFn:path, glass:[[cx+cw*0.12,rTop+ch*0.05,cw*0.3,ch*0.55]], wheels:[[w1,ground,wr],[w2,ground,wr]]};
  }
  function vVan(){
    var cw=W*0.64,ch=H*0.40,cx=(W-cw)/2,by=H*0.36, ground=by+ch;
    var path=function(c){ c.beginPath(); addRR(c,cx,by,cw,ch,ch*0.22);
      c.moveTo(cx+cw*0.72,by); c.lineTo(cx+cw,by+ch*0.35); c.lineTo(cx+cw,by); c.closePath(); };
    carX.fillStyle=carColor; path(carX); carX.fill();
    carX.fillStyle=glassFill();
    carX.fillRect(cx+cw*0.76,by+ch*0.10,cw*0.18,ch*0.22); // windshield
    carX.fillRect(cx+cw*0.10,by+ch*0.10,cw*0.55,ch*0.22); // side windows
    carX.strokeStyle='rgba(0,0,0,.25)'; carX.lineWidth=2;
    carX.beginPath(); carX.moveTo(cx+cw*0.45,by+ch*0.34); carX.lineTo(cx+cw*0.45,by+ch); carX.stroke();
    carX.fillStyle='#04121c'; carX.font='700 '+Math.max(9,ch*0.16)+'px Fredoka,sans-serif'; carX.textAlign='center';
    carX.fillText('LAVAME x FA',cx+cw*0.36,by+ch*0.66);
    carX.fillStyle='#FFF3B0'; carX.beginPath(); carX.ellipse(cx+cw-3,by+ch*0.5,cw*0.018,ch*0.14,0,0,7); carX.fill();
    var w1=cx+cw*0.22,w2=cx+cw*0.80,wr=ch*0.26; wheel(w1,ground,wr); wheel(w2,ground,wr);
    if(polished){ shineStreak(cx+cw*0.15,by+ch*0.07,cx+cw*0.35,by+ch*0.05); }
    geom={pathFn:path, glass:[[cx+cw*0.10,by+ch*0.08,cw*0.84,ch*0.26]], wheels:[[w1,ground,wr],[w2,ground,wr]]};
  }

  /* ---------- Cloths & stages ---------- */
  var CLOTHS={
    carroceria:{name:'paño de carrocería', sw:'#1E88E5', zone:'la carrocería'},
    vidrios:{name:'paño de vidrios', sw:'#26C6DA', zone:'los vidrios'},
    ruedas:{name:'paño de ruedas', sw:'#546E7A', zone:'las ruedas'},
    brillo:{name:'paño de brillo', sw:'#EC407A', zone:'todo el auto'}
  };
  var ORDER=['carroceria','vidrios','ruedas','brillo'];
  var PART={carroceria:'Capó',vidrios:'Parabrisas',ruedas:'Neumático',brillo:'¡Brillo!'};
  var stageIndex=0, activeCloth=null, dirtTotal=1, advancing=false, polishMode=false, phase='start';

  function blob(x,y,r,col){ gritX.fillStyle=col; gritX.beginPath(); gritX.arc(x,y,r,0,7); gritX.fill(); }

  function buildStage(idx,silent){
    advancing=false; polishMode=false; activeCloth=null;
    gritX.setTransform(DPR,0,0,DPR,0,0); gritX.globalCompositeOperation='source-over'; gritX.clearRect(0,0,W,H);
    var key=ORDER[idx], dens=60+level*14;
    if(key==='carroceria'){ gritX.save(); geom.pathFn(gritX); gritX.clip();
      gritX.fillStyle='rgba(120,95,60,.92)'; gritX.fillRect(0,0,W,H);
      for(var i=0;i<dens;i++) blob(Math.random()*W,Math.random()*H,6+Math.random()*18,
        'rgba('+(70+Math.random()*60|0)+','+(55+Math.random()*40|0)+',40,.6)'); gritX.restore();
    } else if(key==='vidrios'){ gritX.save(); geom.pathFn(gritX); gritX.clip();
      geom.glass.forEach(function(g){ gritX.fillStyle='rgba(220,235,245,.92)'; gritX.fillRect(g[0],g[1],g[2],g[3]);
        for(var j=0;j<20;j++) blob(g[0]+Math.random()*g[2],g[1]+Math.random()*g[3],3+Math.random()*6,'rgba(255,255,255,.7)'); });
      gritX.restore();
    } else if(key==='ruedas'){ geom.wheels.forEach(function(w){
        gritX.fillStyle='rgba(90,70,45,.95)'; gritX.beginPath(); gritX.arc(w[0],w[1],w[2]*1.12,0,7); gritX.fill();
        for(var k=0;k<16;k++){ var a=Math.random()*7,d=Math.random()*w[2];
          blob(w[0]+Math.cos(a)*d,w[1]+Math.sin(a)*d,3+Math.random()*6,'rgba(60,45,30,.7)'); } });
    } else if(key==='brillo'){ polishMode=true; gritX.save(); geom.pathFn(gritX); gritX.clip();
      gritX.fillStyle='rgba(200,225,245,.5)'; gritX.fillRect(0,0,W,H); gritX.restore(); }
    dirtTotal=Math.max(1,countDirt()); renderTray(key);
    if(!silent){ var m;
      if(key==='carroceria') m='¡Auto sucio! Toma el paño de carrocería y límpialo en seco.';
      else if(key==='vidrios') m='¡Ahora los vidrios! Toma el paño de vidrios.';
      else if(key==='ruedas') m='¡Las ruedas tienen barro! Toma el paño de ruedas.';
      else m='¡Último paso! Toma el paño de brillo y saca brillo.';
      say(m); showPartLabel(PART[key]); }
  }

  function renderTray(need){ var tray=document.getElementById('tray'); tray.innerHTML='';
    ORDER.forEach(function(key){ var c=CLOTHS[key]; var el=document.createElement('div');
      el.className='cloth'+(key===need?' need':'');
      el.innerHTML='<div class="sw" style="background:'+c.sw+'"></div><div class="cn">'+
        c.name.replace('paño de ','').replace(/^./,function(m){return m.toUpperCase();})+'</div>';
      el.onclick=function(){ pickCloth(key,el); }; tray.appendChild(el); }); }
  function pickCloth(key,el){ activeCloth=key;
    Array.prototype.forEach.call(document.querySelectorAll('.cloth'),function(c){c.classList.remove('active');}); el.classList.add('active');
    var need=ORDER[stageIndex];
    if(key===need){ pop(); say('¡Bien! Frota '+CLOTHS[need].zone+' con el dedo.'); }
    else { buzz(); say('Ese es el '+CLOTHS[key].name+'. Para esto usa el '+CLOTHS[need].name+'.'); } }

  function showPartLabel(txt){ if(vehType==='van'&&txt==='Capó')txt='Carrocería';
    var spots={carroceria:[0.5,0.45],vidrios:[0.5,0.30],ruedas:[0.24,0.78],brillo:[0.5,0.4]};
    var key=ORDER[stageIndex], s=spots[key]||[0.5,0.4];
    var el=document.createElement('div'); el.className='partLabel'; el.textContent=txt;
    el.style.left=(s[0]*100)+'%'; el.style.top=(s[1]*100)+'%'; wrap.appendChild(el);
    setTimeout(function(){el.remove();},1500); }

  /* ---------- Scrub ---------- */
  var scrubbing=false,lastCheck=0,lastWarn=0;
  function countDirt(){ var step=Math.max(6,(gritC.width/40)|0); var d=gritX.getImageData(0,0,gritC.width,gritC.height).data,n=0;
    for(var i=3;i<d.length;i+=4*step){ if(d[i]>40)n++; } return n; }
  function erase(x,y){ gritX.globalCompositeOperation='destination-out'; var rad=Math.max(W,H)*0.07;
    gritX.beginPath(); gritX.arc(x,y,rad,0,7); gritX.fill(); if(polishMode) makeSparkle(x,y); }
  function pos(e){ var r=gritC.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
    return {x:(t.clientX-r.left)*(W/r.width),y:(t.clientY-r.top)*(H/r.height)}; }
  function canScrub(){ return activeCloth===ORDER[stageIndex]; }
  function down(e){ if(phase!=='play')return; e.preventDefault();
    if(!activeCloth){ var n=performance.now(); if(n-lastWarn>1500){lastWarn=n; buzz(); say('Primero elige un paño abajo.');} return; }
    if(!canScrub()){ warnWrong(); return; }
    scrubbing=true; var p=pos(e); erase(p.x,p.y); squeak(); }
  function move(e){ if(!scrubbing)return; e.preventDefault(); var p=pos(e); erase(p.x,p.y);
    if(Math.random()<0.4)squeak(); var now=performance.now(); if(now-lastCheck>220){lastCheck=now; checkProgress();} }
  function up(){ if(!scrubbing)return; scrubbing=false; checkProgress(); }
  function warnWrong(){ var n=performance.now(); if(n-lastWarn<1500)return; lastWarn=n; buzz();
    say('¡Ojo! Para '+CLOTHS[ORDER[stageIndex]].zone+' usa el '+CLOTHS[ORDER[stageIndex]].name+'.'); }
  gritC.addEventListener('touchstart',down,{passive:false}); gritC.addEventListener('touchmove',move,{passive:false});
  gritC.addEventListener('touchend',up); gritC.addEventListener('mousedown',down); gritC.addEventListener('mousemove',move);
  window.addEventListener('mouseup',up);
  function checkProgress(){ if(advancing)return; var prog=(dirtTotal-countDirt())/dirtTotal; if(prog>0.85){ advancing=true; stageDone(); } }

  function makeSparkle(x,y){ if(Math.random()>0.25)return; var s=document.createElement('div'); s.textContent='✨';
    s.style.cssText='position:fixed;z-index:45;font-size:'+(14+Math.random()*14)+'px;pointer-events:none;';
    var rect=gritC.getBoundingClientRect(); s.style.left=(rect.left+x*(rect.width/W))+'px'; s.style.top=(rect.top+y*(rect.height/H))+'px';
    s.style.transition='transform .6s ease,opacity .6s ease'; document.body.appendChild(s);
    requestAnimationFrame(function(){ s.style.transform='translateY(-26px) scale(1.4)'; s.style.opacity='0'; });
    setTimeout(function(){s.remove();},650); if(Math.random()<0.3)sparkle(); }

  /* ---------- Game state ---------- */
  var level=1, score=0, bestScore=0, totalCars=0, carsTarget=2, carsInLevel=0, carStart=0;
  var TYPES_BY_LEVEL=function(n){ var t=['citadino','deportivo']; if(n>=2)t.push('camioneta'); if(n>=3)t.push('van'); return t; };
  function setHUD(){ document.getElementById('sLevel').textContent=level;
    document.getElementById('sScore').textContent=score; document.getElementById('sCars').textContent=totalCars; }
  function say(t){ document.getElementById('bubble').textContent=t; speak(t); }
  function rankName(n){ return n>=60?'Leyenda 🏆':n>=30?'Maestro del Lavado':n>=15?'Experto':n>=5?'Lavador':'Aprendiz'; }

  var QUIZ=[
    {q:'¿Qué paño usamos para los vidrios?',o:['El de vidrios','El de ruedas','El de carrocería'],a:0},
    {q:'¿Lavamos los autos con manguera o en seco?',o:['Con manguera','En seco, sin agua'],a:1},
    {q:'¿Cuántas ruedas tiene un auto?',o:['Dos','Cuatro','Seis'],a:1},
    {q:'¿Qué parte tapa el motor del auto?',o:['El capó','El parabrisas','La rueda'],a:0},
    {q:'¿Para qué sirve el barniz?',o:['Para ensuciar','Para brillar y proteger'],a:1},
    {q:'El parabrisas es la ventana de...',o:['Adelante','Las ruedas'],a:0},
    {q:'Lavando en seco, ¿qué cuidamos?',o:['La basura','El agua del planeta'],a:1},
    {q:'¿Las ruedas también se llaman...?',o:['Neumáticos','Parabrisas'],a:0}
  ];

  /* ---------- Flow ---------- */
  function stageDone(){ if(ORDER[stageIndex]==='brillo'){ carDone(); return; } pop(); stageIndex++;
    setTimeout(function(){ buildStage(stageIndex); },350); }

  function carDone(){ phase='wait'; polishMode=false; polished=true; drawCar(); gritX.clearRect(0,0,W,H);
    document.getElementById('tray').innerHTML='';
    var fast=(performance.now()-carStart)<22000?40:0; var gained=100+fast;
    score+=gained; totalCars++; carsInLevel++; if(score>bestScore)bestScore=score; save(); setHUD(); cheer(); confetti();
    say('¡Auto brillando! +'+gained+' puntos. Ahorraste 180 litros.');
    if(carsInLevel>=carsTarget){ setTimeout(levelComplete,1300); }
    else { document.getElementById('controls').innerHTML='<button class="btn go" id="nextBtn">Siguiente auto 🚗</button>';
      document.getElementById('nextBtn').onclick=newCar; } }

  function newCar(){ phase='play'; polished=false; stageIndex=0; carStart=performance.now();
    var pool=TYPES_BY_LEVEL(level); vehType=pool[(Math.random()*pool.length)|0]; carColor=COLORS[(Math.random()*COLORS.length)|0];
    document.getElementById('controls').innerHTML='';
    drawCar(); buildStage(0,true);
    say('Auto '+(carsInLevel+1)+' de '+carsTarget+'. Toma el paño de carrocería.'); }

  function levelIntro(){ var ov=document.getElementById('overlay'); ov.classList.remove('hidden');
    carsTarget=Math.min(2+(level-1),4); carsInLevel=0; setHUD();
    var pool=TYPES_BY_LEVEL(level); var nuevo = level===2?'¡Se desbloqueó la camioneta! 🛻':level===3?'¡Se desbloqueó la van Lavame x Fa! 🚐':'';
    ov.innerHTML='<div class="tag">NIVEL</div><div class="lvlnum">'+level+'</div>'+
      '<p>Lava <b>'+carsTarget+'</b> autos sin equivocarte de paño.'+(nuevo?'<br>'+nuevo:'')+'</p>'+
      '<button class="btn main" id="goLevel">¡Vamos! 🚗</button>';
    document.getElementById('goLevel').onclick=function(){ ov.classList.add('hidden'); newCar(); };
    speak('Nivel '+level+'. Lava '+carsTarget+' autos.'+(nuevo?' '+nuevo:'')); }

  function levelComplete(){ var ov=document.getElementById('overlay'); ov.classList.remove('hidden'); ding();
    var item=QUIZ[(Math.random()*QUIZ.length)|0]; var answered=false;
    var html='<div class="tag">¡NIVEL '+level+' COMPLETO! 🎉</div><h1 style="font-size:clamp(20px,5vw,28px)">Pregunta de Gotita</h1>'+
      '<p>'+item.q+'</p><div class="opts" id="opts"></div>';
    ov.innerHTML=html; speak('¡Nivel completo! '+item.q);
    var box=document.getElementById('opts');
    item.o.forEach(function(txt,i){ var b=document.createElement('button'); b.className='opt'; b.textContent=txt;
      b.onclick=function(){ if(answered)return; answered=true;
        if(i===item.a){ b.classList.add('ok'); score+=50; setHUD(); save(); ding(); say('¡Correcto! +50 puntos.'); }
        else { b.classList.add('bad'); box.children[item.a].classList.add('ok'); buzz(); say('Casi. La respuesta era: '+item.o[item.a]); }
        setTimeout(function(){ var c=document.createElement('button'); c.className='btn go'; c.style.marginTop='14px';
          c.textContent='Siguiente nivel ➜'; c.onclick=function(){ level++; save(); levelIntro(); }; ov.appendChild(c); },700); };
      box.appendChild(b); }); }

  function confetti(){ var em=['💧','✨','🫧','🚗','🌟','♻️','🏆'];
    for(var i=0;i<28;i++){ (function(){ var c=document.createElement('div'); c.className='confetti';
      c.textContent=em[(Math.random()*em.length)|0]; c.style.left=(Math.random()*100)+'vw';
      c.style.animationDuration=(2+Math.random()*1.8)+'s'; c.style.fontSize=(20+Math.random()*22)+'px';
      document.body.appendChild(c); setTimeout(function(){c.remove();},4200); })(); } }

  /* ---------- Start ---------- */
  document.getElementById('playBtn').addEventListener('click',function(){
    ac(); if('speechSynthesis' in window){ try{ var w=new SpeechSynthesisUtterance(' '); w.lang='es-MX'; speechSynthesis.speak(w);}catch(e){} }
    var s=load(); if(s){ totalCars=s.total||0; level=s.level||1; bestScore=s.best||0; }
    document.getElementById('startScreen').classList.add('hidden'); resize(); setHUD(); levelIntro(); cheer(); });
  window.addEventListener('resize',function(){ if(phase!=='start')resize(); });
  window.addEventListener('orientationchange',function(){ setTimeout(function(){ if(phase!=='start')resize(); },300); });
  setHUD();
})();
</script>
</body>
