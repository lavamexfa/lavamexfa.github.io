<style>
  :root{--bg:#0a0a0c;--panel:#16181f;--ink:#eef2f8;--muted:#9aa6b8;--cyan:#35d0ff;--blue:#1f8fff;--gold:#FFC83D;--pink:#FF5C8A;--green:#4ADE80;
    --font:"Fredoka","Baloo 2",-apple-system,"Segoe UI Rounded","Arial Rounded MT Bold",system-ui,sans-serif;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:var(--font);color:var(--ink);
    background:radial-gradient(circle at 50% 0%,#15171f 0%,#0a0a0c 60%);-webkit-user-select:none;user-select:none;touch-action:manipulation;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;}
  #top{width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;padding:8px 12px 2px;gap:8px;z-index:5;flex-wrap:wrap;}
  .brandbox{display:flex;align-items:center;gap:6px;}
  .logo{height:clamp(28px,6.5vw,44px);width:auto;border-radius:9px;display:block;}
  .enseco{background:linear-gradient(90deg,var(--cyan),var(--blue));color:#04121c;font-weight:700;font-size:11px;padding:3px 8px;border-radius:10px;white-space:nowrap;}
  .scoreboard{display:flex;gap:6px;}
  .stat{background:var(--panel);border:1px solid #262a34;border-radius:14px;padding:5px 9px;min-width:48px;text-align:center;}
  .stat .n{font-weight:700;font-size:clamp(14px,3.4vw,19px);line-height:1;color:var(--cyan);}
  .stat .l{font-size:9px;font-weight:600;color:var(--muted);}
  #sound{background:var(--panel);border:1px solid #262a34;border-radius:13px;font-size:18px;width:40px;height:40px;color:var(--ink);cursor:pointer;flex:none;}
  #stage{position:relative;width:100%;max-width:900px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px 10px 6px;}
  #washWrap{position:relative;width:min(93vw,640px);aspect-ratio:5/3.4;background:radial-gradient(ellipse at 50% 30%,#2b313f 0%,#14171e 55%,#0c0e13 100%);
    border-radius:26px;box-shadow:inset 0 0 50px rgba(0,0,0,.7),0 10px 34px rgba(0,0,0,.55);overflow:hidden;border:1px solid #2a2f3b;}
  #washWrap canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #carCanvas{z-index:1;} #gritCanvas{z-index:2;touch-action:none;}
  #floor{position:absolute;left:0;right:0;bottom:0;height:26%;z-index:0;background:linear-gradient(#2f3543,#161922);box-shadow:inset 0 14px 24px rgba(0,0,0,.4);}
  #spot{position:absolute;left:50%;top:-12%;width:130%;height:90%;transform:translateX(-50%);background:radial-gradient(ellipse at center,rgba(53,208,255,.12),transparent 62%);z-index:0;pointer-events:none;}
  #wmlogo{position:absolute;right:8px;bottom:7px;height:22px;opacity:.45;z-index:3;border-radius:5px;pointer-events:none;}
  .minidrop{position:absolute;z-index:0;width:clamp(26px,7vw,40px);opacity:.9;pointer-events:none;}
  .minidrop.d1{left:5%;top:10%;animation:dance 3.2s ease-in-out infinite;}
  .minidrop.d2{right:6%;top:14%;animation:dance 3.8s ease-in-out infinite .4s;}
  .minidrop.d3{left:8%;bottom:6%;animation:dance2 2.8s ease-in-out infinite .2s;}
  @keyframes dance{0%,100%{transform:translateY(0) rotate(-8deg);}25%{transform:translateY(-12px) rotate(8deg);}50%{transform:translateY(0) rotate(-6deg);}75%{transform:translateY(-8px) rotate(6deg);}}
  @keyframes dance2{0%,100%{transform:translate(0,0) rotate(6deg) scaleX(1);}50%{transform:translate(8px,-8px) rotate(-8deg) scaleX(-1);}}
  #book{background:linear-gradient(90deg,var(--green),#22b86a);border:none;border-radius:13px;font-size:13px;font-weight:700;color:#04121c;padding:0 10px;height:40px;cursor:pointer;flex:none;}
  #music{background:var(--panel);border:1px solid #262a34;border-radius:13px;font-size:17px;width:40px;height:40px;color:var(--ink);cursor:pointer;flex:none;}
  #music.off{opacity:.45;}
  .datotip{position:absolute;z-index:4;max-width:170px;background:var(--gold);color:#1a1205;font-weight:700;font-size:12px;padding:7px 11px;border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,.5);opacity:0;transform:translateY(6px);transition:opacity .3s,transform .3s;pointer-events:none;}
  .datotip.show{opacity:1;transform:translateY(0);}
  .datotip::after{content:"";position:absolute;left:18px;bottom:-7px;border:7px solid transparent;border-top-color:var(--gold);}
  .photoframe{width:min(88vw,420px);border-radius:14px;overflow:hidden;margin:6px 0;border:1px solid #2a2f3b;box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .photoframe img{width:100%;display:block;}
  /* ===== Portada (colores nuevos: azul petróleo + verde-agua eco + dorado) ===== */
  #startScreen{background:linear-gradient(165deg,rgba(10,74,79,.80),rgba(3,21,26,.93));background-size:cover;background-position:center;overflow:hidden;}
  #startScreen .coverGlow{position:absolute;width:120vw;height:120vw;max-width:760px;max-height:760px;top:-30%;left:50%;transform:translateX(-50%);
    background:radial-gradient(circle,rgba(45,224,176,.20),transparent 60%);pointer-events:none;z-index:0;}
  #startScreen>*{position:relative;z-index:1;}
  .coverHero{width:clamp(96px,27vw,160px);margin:2px 0 4px;filter:drop-shadow(0 10px 22px rgba(45,224,176,.35));animation:bob 2.4s ease-in-out infinite;}
  #startScreen .logoBig{width:clamp(140px,40vw,230px);margin-bottom:2px;}
  #startScreen h1{display:none;}
  #startScreen .tag{background:linear-gradient(90deg,#2DE0B0,#19b88c);color:#022;}
  .coverHook{max-width:380px;color:#dff5ef;}
  .coverHook b{color:#2DE0B0;}
  #playBtn.btn.main{background:linear-gradient(90deg,#2DE0B0,#16c79a);color:#04221a;box-shadow:0 10px 26px rgba(45,224,176,.4);}
  .coverRow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px;}
  .coverRow a,.coverRow button{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#dff5ef;
    font-family:var(--font);font-weight:700;font-size:13px;padding:9px 14px;border-radius:13px;cursor:pointer;text-decoration:none;}
  .coverRow a:active,.coverRow button:active{transform:translateY(2px);}
  /* ===== WhatsApp siempre a mano ===== */
  #waFab{position:fixed;right:12px;bottom:14px;z-index:70;display:none;align-items:center;gap:6px;
    background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;font-family:var(--font);font-weight:700;font-size:13px;
    padding:11px 15px;border-radius:30px;border:none;cursor:pointer;text-decoration:none;box-shadow:0 8px 22px rgba(18,140,126,.5);}
  #waFab:active{transform:translateY(2px);}
  #waFab .wi{font-size:17px;line-height:1;}
  .ovLogo{height:30px;width:auto;border-radius:7px;margin-bottom:8px;display:block;box-shadow:0 2px 8px rgba(0,0,0,.5);}
  .upsell{background:linear-gradient(90deg,rgba(45,224,176,.16),rgba(255,200,61,.16));border:1px solid #2a3f3a;border-radius:14px;
    padding:11px 14px;font-size:13.5px;font-weight:600;color:#eafff8;max-width:min(90vw,400px);margin:10px 0;line-height:1.5;}
  .upsell b{color:#2DE0B0;}
  .gfield{display:flex;flex-direction:column;gap:4px;width:min(88vw,380px);text-align:left;margin:5px 0;}
  .gfield label{font-size:12px;color:var(--muted);font-weight:700;}
  .gfield input,.gfield select{background:#0f131b;border:1px solid #2a2f3b;border-radius:11px;color:var(--ink);padding:11px 12px;font-size:15px;font-family:inherit;}
  .grules{background:rgba(53,208,255,.08);border:1px solid #243240;border-radius:12px;padding:10px 13px;font-size:12.5px;color:var(--ink);max-width:min(88vw,380px);text-align:left;margin:6px 0;line-height:1.55;}
  .gbanner{background:var(--gold);color:#1a1205;font-weight:700;border-radius:12px;padding:9px 13px;font-size:13px;max-width:min(88vw,380px);margin-bottom:6px;}
  #gotita{position:relative;margin-top:-2px;display:flex;align-items:flex-end;gap:8px;width:min(93vw,640px);z-index:4;}
  #drop{width:clamp(50px,12vw,78px);flex:none;animation:bob 1.8s ease-in-out infinite;transform-origin:bottom center;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-7px) rotate(2deg);}}
  #bubble{background:var(--panel);border:1px solid #2a2f3b;border-radius:18px;padding:9px 13px;flex:1;position:relative;font-weight:600;font-size:clamp(13px,3.3vw,17px);min-height:44px;display:flex;align-items:center;}
  #bubble::before{content:"";position:absolute;left:-11px;bottom:14px;border:8px solid transparent;border-right-color:var(--panel);}
  #tray{display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap;width:min(93vw,640px);z-index:4;}
  .card{background:var(--panel);border:3px solid #2a2f3b;border-radius:18px;padding:8px 10px;min-width:104px;max-width:160px;text-align:center;cursor:pointer;transition:transform .08s,border-color .12s,box-shadow .12s;}
  .card:active{transform:translateY(3px);}
  .card .ic{height:40px;display:flex;align-items:center;justify-content:center;}
  .card .ti{font-weight:700;font-size:13px;color:var(--ink);margin-top:2px;}
  .card .su{font-size:11px;color:var(--muted);font-weight:600;}
  .card.good{border-color:var(--green);} .card.bad{border-color:#46505f;}
  .card.active{border-color:var(--gold);box-shadow:0 0 16px rgba(255,200,61,.5);transform:translateY(-3px);}
  .card.need{animation:needp 1s ease infinite;}
  @keyframes needp{0%,100%{box-shadow:0 0 0 rgba(53,208,255,0);}50%{box-shadow:0 0 0 4px var(--cyan);}}
  #tray.palette{background:rgba(255,255,255,.05);border:1px solid #2a2f3b;border-radius:20px;padding:8px;gap:8px;backdrop-filter:blur(6px);box-shadow:inset 0 1px 0 rgba(255,255,255,.05);}
  .tool{background:linear-gradient(#202632,#171b22);border:2px solid #2f3645;border-radius:16px;padding:8px 6px;min-width:80px;max-width:130px;cursor:pointer;color:var(--ink);font-family:var(--font);
    display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .08s,border-color .12s,box-shadow .12s;}
  .tool:active{transform:translateY(2px);}
  .tool .ic{height:38px;display:flex;align-items:center;justify-content:center;}
  .tool .tl{font-size:11px;font-weight:700;line-height:1.05;}
  .tool.active{border-color:var(--gold);box-shadow:0 0 18px rgba(255,200,61,.45),inset 0 0 12px rgba(255,200,61,.12);transform:translateY(-2px);}
  .tool.badsel{border-color:var(--pink);box-shadow:0 0 14px rgba(255,92,138,.35);}
  #controls{width:min(93vw,640px);display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center;z-index:4;padding-bottom:6px;min-height:8px;}
  .btn{border:none;border-radius:20px;padding:13px 18px;font-family:var(--font);font-weight:700;font-size:clamp(15px,3.7vw,19px);cursor:pointer;transition:transform .06s,filter .06s;display:inline-flex;align-items:center;gap:8px;color:#04121c;text-decoration:none;}
  .btn:active{transform:translateY(3px);filter:brightness(1.1);}
  .btn.main{background:linear-gradient(90deg,var(--gold),#ff9d2f);}
  .btn.go{background:linear-gradient(90deg,var(--green),#22b86a);}
  .btn.ghost{background:var(--panel);color:var(--cyan);border:1px solid #2a2f3b;}
  #links{width:100%;text-align:center;font-size:clamp(11px,3vw,14px);font-weight:600;color:var(--muted);text-decoration:none;padding:4px 0 8px;z-index:5;}
  #hand{position:fixed;z-index:46;font-size:40px;pointer-events:none;transform:translate(-50%,-72%);display:none;filter:drop-shadow(0 3px 5px rgba(0,0,0,.6));}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;text-align:center;padding:24px 20px;background:radial-gradient(circle at 50% 18%,#15171f,#070708 72%);overflow-y:auto;}
  .screen.over{background:rgba(7,7,8,.94);opacity:0;animation:fadein .35s ease forwards;}
  @keyframes fadein{to{opacity:1;}}
  .screen h1{font-size:clamp(26px,7vw,44px);margin:4px 0;color:var(--ink);line-height:1.02;}
  .screen h1 b{color:var(--cyan);}
  .screen .tag{background:linear-gradient(90deg,var(--cyan),var(--blue));color:#04121c;font-weight:700;padding:6px 14px;border-radius:14px;font-size:clamp(13px,3.6vw,17px);margin:6px 0;}
  .screen p{font-size:clamp(15px,3.7vw,19px);font-weight:600;max-width:440px;margin:8px 0 14px;}
  .screen .gnum{font-size:clamp(40px,13vw,82px);color:var(--gold);line-height:1;margin:4px;}
  .logoBig{width:clamp(150px,42vw,250px);border-radius:16px;margin-bottom:8px;}
  .startlinks{color:var(--cyan);font-weight:700;text-decoration:none;margin-top:12px;font-size:15px;background:var(--panel);border:1px solid #2a2f3b;padding:6px 16px;border-radius:14px;}
  .svc{display:flex;flex-direction:column;gap:6px;width:min(88vw,400px);margin:6px 0 10px;text-align:left;max-height:42vh;overflow-y:auto;}
  .svc .row{background:var(--panel);border:1px solid #2a2f3b;border-radius:12px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .svc .row b{color:var(--ink);font-size:14px;display:block;} .svc .row small{color:var(--muted);font-size:11px;font-weight:600;} .svc .row span{color:var(--cyan);font-size:13px;font-weight:700;white-space:nowrap;}
  .hidden{display:none!important;}
  #wheelBox{position:relative;width:min(76vw,310px);height:min(76vw,310px);margin:10px auto;}
  #wheel{width:100%;height:100%;transform:rotate(0deg);filter:drop-shadow(0 8px 20px rgba(0,0,0,.6));}
  #ptr{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:0;height:0;z-index:2;border-left:14px solid transparent;border-right:14px solid transparent;border-top:24px solid var(--gold);filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));}
  .confetti{position:fixed;top:-40px;font-size:28px;z-index:48;pointer-events:none;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.9;}}
  @media (prefers-reduced-motion: reduce){#drop,.logoBig{animation:none;}}
</style>
</head>
