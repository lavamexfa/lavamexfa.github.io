<title>Gotita y Lavame x Fa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#4FC3F7; --sun:#FFD54F; --bubble:#FF8FB1; --ocean:#0D3B66; --grass:#7ED957;
    --font:"Fredoka","Baloo 2",-apple-system,"Segoe UI Rounded","Arial Rounded MT Bold",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:var(--font);
    background:linear-gradient(#7ad3f7 0%,#bfeaff 55%,#dff6ff 100%);color:var(--ocean);
    -webkit-user-select:none;user-select:none;touch-action:manipulation;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;}

  #top{width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;
    padding:8px 12px 2px;gap:8px;z-index:5;flex-wrap:wrap;}
  .brandbox{display:flex;align-items:center;gap:6px;}
  .logo{height:clamp(30px,7vw,46px);width:auto;border-radius:9px;display:block;}
  .enseco{background:#0288D1;color:#fff;font-weight:700;font-size:11px;padding:3px 8px;
    border-radius:10px;white-space:nowrap;box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .scoreboard{display:flex;gap:6px;}
  .stat{background:#fff;border-radius:14px;padding:5px 9px;min-width:52px;text-align:center;
    box-shadow:0 4px 0 rgba(2,119,189,.25);}
  .stat .n{font-weight:700;font-size:clamp(15px,3.6vw,20px);line-height:1;color:#0288D1;}
  .stat .l{font-size:9px;font-weight:600;opacity:.7;}
  #sound{background:#fff;border:none;border-radius:13px;font-size:18px;width:40px;height:40px;
    box-shadow:0 4px 0 rgba(2,119,189,.25);cursor:pointer;flex:none;}

  #stage{position:relative;width:100%;max-width:900px;flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:2px 10px 6px;}
  #washWrap{position:relative;width:min(92vw,620px);aspect-ratio:5/3.3;background:#cfeeff;
    border-radius:26px;box-shadow:inset 0 6px 18px rgba(2,119,189,.18),0 8px 0 rgba(2,119,189,.2);
    overflow:hidden;border:5px solid #fff;}
  #washWrap canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #carCanvas{z-index:1;} #gritCanvas{z-index:2;touch-action:none;}
  #floor{position:absolute;left:0;right:0;bottom:0;height:22%;
    background:linear-gradient(#8ed0ff,#5bb8f0);z-index:0;}
  #wmlogo{position:absolute;right:8px;bottom:8px;height:26px;opacity:.6;z-index:3;border-radius:5px;pointer-events:none;}

  #gotita{position:relative;margin-top:-4px;display:flex;align-items:flex-end;gap:8px;
    width:min(92vw,620px);z-index:4;}
  #drop{width:clamp(52px,13vw,80px);flex:none;animation:bob 1.8s ease-in-out infinite;transform-origin:bottom center;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-8px) rotate(2deg);}}
  #bubble{background:#fff;border-radius:18px;padding:9px 13px;flex:1;position:relative;
    box-shadow:0 5px 0 rgba(2,119,189,.18);font-weight:600;font-size:clamp(13px,3.4vw,17px);
    min-height:44px;display:flex;align-items:center;}
  #bubble::before{content:"";position:absolute;left:-12px;bottom:14px;border:8px solid transparent;border-right-color:#fff;}

  #tray{display:flex;gap:8px;justify-content:center;margin-top:8px;flex-wrap:wrap;
    width:min(92vw,620px);z-index:4;}
  .cloth{background:#fff;border:3px solid transparent;border-radius:16px;padding:6px 8px;
    min-width:66px;text-align:center;cursor:pointer;box-shadow:0 4px 0 rgba(2,119,189,.2);
    transition:transform .08s;}
  .cloth:active{transform:translateY(3px);}
  .cloth .sw{width:34px;height:24px;border-radius:7px;margin:0 auto 3px;border:2px solid rgba(0,0,0,.1);}
  .cloth .cn{font-size:11px;font-weight:700;line-height:1.05;color:var(--ocean);}
  .cloth.active{border-color:#FFB300;transform:translateY(-3px);box-shadow:0 7px 0 rgba(255,179,0,.4);}
  .cloth.need{animation:needp 1s ease infinite;}
  @keyframes needp{0%,100%{box-shadow:0 4px 0 rgba(2,119,189,.2);}50%{box-shadow:0 0 0 5px #FFD54F;}}

  #controls{width:min(92vw,620px);display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;
    justify-content:center;z-index:4;padding-bottom:6px;min-height:8px;}
  .btn{border:none;border-radius:20px;padding:13px 18px;font-family:var(--font);font-weight:700;
    font-size:clamp(15px,3.8vw,19px);color:#fff;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.18);
    transition:transform .06s,box-shadow .06s;display:flex;align-items:center;gap:8px;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .btn.main{background:linear-gradient(#FFD54F,#FFB300);color:#5a3d00;}
  .btn.go{background:linear-gradient(#7ED957,#43A047);}
  .btn.ghost{background:#fff;color:#0288D1;box-shadow:0 6px 0 rgba(2,119,189,.2);}

  #links{width:100%;text-align:center;font-size:clamp(11px,3vw,14px);font-weight:600;
    color:#0277BD;text-decoration:none;padding:4px 0 8px;z-index:5;}

  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;z-index:30;text-align:center;padding:24px;
    background:linear-gradient(#7ad3f7,#cdefff);}
  .screen h1{font-size:clamp(28px,7.5vw,48px);margin:4px 0;color:#fff;text-shadow:0 4px 0 #0288D1;line-height:1;}
  .screen .tag{background:#0288D1;color:#fff;font-weight:700;padding:6px 14px;border-radius:14px;
    font-size:clamp(13px,3.6vw,17px);margin:6px 0;}
  .screen p{font-size:clamp(15px,3.8vw,19px);font-weight:600;max-width:420px;margin:8px 0 16px;}
  .logoBig{width:clamp(150px,42vw,250px);border-radius:16px;margin-bottom:8px;box-shadow:0 8px 0 rgba(0,0,0,.18);}
  .startlinks{color:#fff;font-weight:700;text-decoration:none;margin-top:14px;font-size:15px;
    background:rgba(2,119,189,.55);padding:6px 16px;border-radius:14px;}
  .hidden{display:none!important;}

  .confetti{position:fixed;top:-40px;font-size:28px;z-index:40;pointer-events:none;
    animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.9;}}

  @media (prefers-reduced-motion: reduce){#drop,.logoBig{animation:none;}}
</style>
</head>

<div id="app">

  function sparkle(){ tone(1200+Math.random()*500,.12,'sine',.10); }
  function buzz(){ tone(160,.16,'sawtooth',.12); }
  function cheer(){ [523,659,784,1046].forEach(function(f,i){ setTimeout(function(){tone(f,.18,'triangle',.16);},i*110); }); }

  function loadVoices(){ try{ var vs=speechSynthesis.getVoices();
    esVoice=vs.filter(function(v){return /es/i.test(v.lang);})[0]||null; }catch(e){} }
  if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
  function speak(t){ if(!soundOn||!('speechSynthesis' in window))return;
    try{ speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(t.replace(/[\u{1F300}-\u{1FAFF}\u2600-\u27BF]/gu,''));
      u.lang='es-ES'; if(esVoice)u.voice=esVoice; u.rate=1; u.pitch=1.15; speechSynthesis.speak(u); }catch(e){} }

  document.getElementById('sound').addEventListener('click',function(){
    soundOn=!soundOn; this.textContent=soundOn?'🔊':'🔇';
    if(soundOn){ac();pop();} else if('speechSynthesis' in window){try{speechSynthesis.cancel();}catch(e){}}
  });

  /* ---------- Canvas ---------- */
  var wrap=document.getElementById('washWrap');
  var carC=document.getElementById('carCanvas'), gritC=document.getElementById('gritCanvas');
  var carX=carC.getContext('2d'), gritX=gritC.getContext('2d');
  var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);

  function resize(){ var r=wrap.getBoundingClientRect(); W=r.width; H=r.height;
    [carC,gritC].forEach(function(cv){ cv.width=W*DPR; cv.height=H*DPR;
      cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0); });
    drawCar(); if(phase==='play') buildStage(stageIndex,true); }

  /* ---------- Car ---------- */
  var COLORS=['#E53935','#1E88E5','#43A047','#FB8C00','#8E24AA','#00ACC1','#FDD835','#EC407A'];
  var carColor='#E53935', photoImg=null, polished=false, geom=null;

  function rr(x,y,w,h,rad){ carX.beginPath(); carX.moveTo(x+rad,y);
    carX.arcTo(x+w,y,x+w,y+h,rad); carX.arcTo(x+w,y+h,x,y+h,rad);
    carX.arcTo(x,y+h,x,y,rad); carX.arcTo(x,y,x+w,y,rad); carX.closePath(); }

  function drawCar(){
    carX.clearRect(0,0,W,H);
    if(photoImg){ var ar=photoImg.width/photoImg.height,war=W/H,dw,dh,dx,dy;
      if(ar>war){dh=H;dw=H*ar;dx=(W-dw)/2;dy=0;}else{dw=W;dh=W/ar;dx=0;dy=(H-dh)/2;}
      carX.drawImage(photoImg,dx,dy,dw,dh);
      geom={cx:W*0.1,cy:H*0.1,cw:W*0.8,ch:H*0.8,w1:W*0.25,w2:W*0.75,wy:H*0.85,wr:H*0.12}; return; }
    var cw=W*0.74,ch=H*0.42,cx=(W-cw)/2,cy=H*0.40;
    geom={cx:cx,cy:cy,cw:cw,ch:ch,w1:cx+cw*0.24,w2:cx+cw*0.76,wy:cy+ch,wr:ch*0.36};
    carX.fillStyle='rgba(0,0,0,.12)'; carX.beginPath();
    carX.ellipse(W/2,cy+ch+H*0.04,cw*0.55,H*0.05,0,0,7); carX.fill();
    carX.fillStyle=carColor; rr(cx,cy,cw,ch,ch*0.42); carX.fill();
    carX.beginPath(); carX.moveTo(cx+cw*0.20,cy+2);
    carX.quadraticCurveTo(cx+cw*0.30,cy-ch*0.55,cx+cw*0.46,cy-ch*0.55);
    carX.lineTo(cx+cw*0.66,cy-ch*0.55);
    carX.quadraticCurveTo(cx+cw*0.80,cy-ch*0.52,cx+cw*0.84,cy+2); carX.closePath(); carX.fill();
    carX.fillStyle='#cdeffe';
    carX.beginPath(); carX.moveTo(cx+cw*0.26,cy-2);
    carX.quadraticCurveTo(cx+cw*0.33,cy-ch*0.42,cx+cw*0.46,cy-ch*0.42);
    carX.lineTo(cx+cw*0.46,cy-2); carX.closePath(); carX.fill();
    carX.beginPath(); carX.moveTo(cx+cw*0.50,cy-ch*0.42); carX.lineTo(cx+cw*0.64,cy-ch*0.42);
    carX.quadraticCurveTo(cx+cw*0.74,cy-ch*0.40,cx+cw*0.78,cy-2);
    carX.lineTo(cx+cw*0.50,cy-2); carX.closePath(); carX.fill();
    carX.strokeStyle='rgba(0,0,0,.18)'; carX.lineWidth=2;
    carX.beginPath(); carX.moveTo(cx+cw*0.48,cy+ch*0.1); carX.lineTo(cx+cw*0.48,cy+ch*0.85); carX.stroke();
    carX.fillStyle='#FFF59D'; carX.beginPath(); carX.ellipse(cx+cw-6,cy+ch*0.4,cw*0.03,ch*0.18,0,0,7); carX.fill();
    carX.fillStyle='#263238';
    [geom.w1,geom.w2].forEach(function(wx){ carX.beginPath(); carX.arc(wx,cy+ch,ch*0.36,0,7); carX.fill();
      carX.fillStyle='#B0BEC5'; carX.beginPath(); carX.arc(wx,cy+ch,ch*0.16,0,7); carX.fill(); carX.fillStyle='#263238'; });
    if(polished){ carX.strokeStyle='rgba(255,255,255,.9)'; carX.lineWidth=5; carX.lineCap='round';
      carX.beginPath(); carX.moveTo(cx+cw*0.30,cy+ch*0.22); carX.lineTo(cx+cw*0.42,cy+ch*0.18); carX.stroke();
      carX.lineWidth=3; carX.beginPath(); carX.moveTo(cx+cw*0.30,cy+ch*0.34); carX.lineTo(cx+cw*0.38,cy+ch*0.31); carX.stroke(); }
  }

  /* ---------- Cloths & stages ---------- */
  var CLOTHS={
    carroceria:{name:'paño de carrocería', sw:'#1E88E5', zone:'la carrocería'},
    vidrios:{name:'paño de vidrios', sw:'#26C6DA', zone:'los vidrios'},
    ruedas:{name:'paño de ruedas', sw:'#546E7A', zone:'las ruedas'},
    brillo:{name:'paño de brillo', sw:'#EC407A', zone:'todo el auto'}
  };
  var ORDER=['carroceria','vidrios','ruedas','brillo'];
  var stageIndex=0, activeCloth=null, dirtTotal=1, advancing=false, polishMode=false;
  var phase='start';

  function blob(x,y,r,col){ gritX.fillStyle=col; gritX.beginPath(); gritX.arc(x,y,r,0,7); gritX.fill(); }
  function fillRect(x,y,w,h,col){ gritX.fillStyle=col; gritX.fillRect(x,y,w,h); }

  function buildStage(idx,silent){
    advancing=false; polishMode=false; activeCloth=null;
    gritX.setTransform(DPR,0,0,DPR,0,0);
    gritX.globalCompositeOperation='source-over';
    gritX.clearRect(0,0,W,H);
    var g=geom, key=ORDER[idx];

    if(key==='carroceria'){
      var bx=g.cx, by=g.cy-g.ch*0.55, bw=g.cw, bh=g.ch*1.55;
      if(photoImg){ bx=0;by=0;bw=W;bh=H; }
      fillRect(bx,by,bw,bh,'rgba(120,95,60,.92)');
      for(var i=0;i<70;i++) blob(bx+Math.random()*bw,by+Math.random()*bh,6+Math.random()*20,
        'rgba('+(70+Math.random()*60|0)+','+(55+Math.random()*40|0)+',40,.6)');
    } else if(key==='vidrios'){
      fillRect(g.cx+g.cw*0.24,g.cy-g.ch*0.5,g.cw*0.24,g.ch*0.55,'rgba(220,235,245,.9)');
      fillRect(g.cx+g.cw*0.50,g.cy-g.ch*0.5,g.cw*0.30,g.ch*0.55,'rgba(220,235,245,.9)');
      for(var j=0;j<30;j++) blob(g.cx+g.cw*(0.25+Math.random()*0.55),g.cy-g.ch*(Math.random()*0.45),
        4+Math.random()*8,'rgba(255,255,255,.7)');
    } else if(key==='ruedas'){
      [g.w1,g.w2].forEach(function(wx){
        gritX.fillStyle='rgba(90,70,45,.95)'; gritX.beginPath(); gritX.arc(wx,g.wy,g.wr*1.15,0,7); gritX.fill();
        for(var k=0;k<14;k++) blob(wx+(Math.random()-0.5)*g.wr*1.8,g.wy+(Math.random()-0.5)*g.wr*1.8,
          3+Math.random()*7,'rgba(60,45,30,.7)'); });
    } else if(key==='brillo'){
      polishMode=true;
      var px=g.cx, py=g.cy-g.ch*0.55, pw=g.cw, ph=g.ch*1.7;
      if(photoImg){px=0;py=0;pw=W;ph=H;}
      fillRect(px,py,pw,ph,'rgba(205,228,248,.5)');
    }
    dirtTotal=Math.max(1,countDirt());
    renderTray(key);
    if(!silent){
      var msg;
      if(key==='carroceria') msg='¡Auto sucio! Toma el '+CLOTHS.carroceria.name+' y limpia la carrocería en seco.';
      else if(key==='vidrios') msg='¡Ahora los vidrios! Toma el '+CLOTHS.vidrios.name+'.';
      else if(key==='ruedas') msg='¡Las ruedas tienen barro! Toma el '+CLOTHS.ruedas.name+'.';
      else msg='¡Último paso! Toma el '+CLOTHS.brillo.name+' y saca brillo.';
      say(msg);
    }
  }

  function renderTray(needKey){
    var tray=document.getElementById('tray'); tray.innerHTML='';
    ORDER.forEach(function(key){ var c=CLOTHS[key];
      var el=document.createElement('div'); el.className='cloth'+(key===needKey?' need':'');
      el.innerHTML='<div class="sw" style="background:'+c.sw+'"></div><div class="cn">'+
        c.name.replace('paño de ','').replace(/^./,function(m){return m.toUpperCase();})+'</div>';
      el.onclick=function(){ pickCloth(key,el); };
      tray.appendChild(el); });
  }
  function pickCloth(key,el){
    activeCloth=key;
    Array.prototype.forEach.call(document.querySelectorAll('.cloth'),function(c){c.classList.remove('active');});
    el.classList.add('active');
    var need=ORDER[stageIndex];
    if(key===need){ pop(); say('¡Bien! Frota '+CLOTHS[need].zone+' con el dedo. 💪'); }
    else { buzz(); say('Ese es el '+CLOTHS[key].name+'. Para esto usa el '+CLOTHS[need].name+'. 👀'); }
  }

  /* ---------- Scrub ---------- */
  var scrubbing=false,lastCheck=0,lastWarn=0;
  function countDirt(){ var step=Math.max(6,(gritC.width/40)|0);
    var d=gritX.getImageData(0,0,gritC.width,gritC.height).data,n=0;
    for(var i=3;i<d.length;i+=4*step){ if(d[i]>40)n++; } return n; }
  function erase(x,y){ gritX.globalCompositeOperation='destination-out';
    var rad=Math.max(W,H)*0.07; gritX.beginPath(); gritX.arc(x,y,rad,0,7); gritX.fill();
    if(polishMode) makeSparkle(x,y); }
  function pos(e){ var r=gritC.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
    return {x:(t.clientX-r.left)*(W/r.width),y:(t.clientY-r.top)*(H/r.height)}; }
  function canScrub(){ return activeCloth===ORDER[stageIndex]; }
  function down(e){ if(phase!=='play')return; e.preventDefault();
    if(!activeCloth){ var n=performance.now(); if(n-lastWarn>1500){lastWarn=n; buzz(); say('Primero elige un paño abajo 👇'); } return; }
    if(!canScrub()){ warnWrong(); return; }
    scrubbing=true; var p=pos(e); erase(p.x,p.y); squeak(); }
  function move(e){ if(!scrubbing)return; e.preventDefault(); var p=pos(e); erase(p.x,p.y);
    if(Math.random()<0.4)squeak();
    var now=performance.now(); if(now-lastCheck>220){lastCheck=now; checkProgress();} }
  function up(){ if(!scrubbing)return; scrubbing=false; checkProgress(); }
  function warnWrong(){ var n=performance.now(); if(n-lastWarn<1500)return; lastWarn=n; buzz();
    say('¡Ojo! Para '+CLOTHS[ORDER[stageIndex]].zone+' usa el '+CLOTHS[ORDER[stageIndex]].name+'. 🙃'); }
  gritC.addEventListener('touchstart',down,{passive:false});
  gritC.addEventListener('touchmove',move,{passive:false});
  gritC.addEventListener('touchend',up);
  gritC.addEventListener('mousedown',down);
  gritC.addEventListener('mousemove',move);
  window.addEventListener('mouseup',up);

  function checkProgress(){ if(advancing)return;
    var now=countDirt(), prog=(dirtTotal-now)/dirtTotal;
    if(prog>0.85){ advancing=true; stageDone(); } }

  function makeSparkle(x,y){ if(Math.random()>0.25)return;
    var s=document.createElement('div'); s.textContent='✨';
    s.style.cssText='position:fixed;z-index:45;font-size:'+(14+Math.random()*14)+'px;pointer-events:none;';
    var rect=gritC.getBoundingClientRect();
    s.style.left=(rect.left+x*(rect.width/W))+'px'; s.style.top=(rect.top+y*(rect.height/H))+'px';
    s.style.transition='transform .6s ease,opacity .6s ease'; document.body.appendChild(s);
    requestAnimationFrame(function(){ s.style.transform='translateY(-26px) scale(1.4)'; s.style.opacity='0'; });
    setTimeout(function(){s.remove();},650); if(Math.random()<0.3)sparkle(); }

  /* ---------- Flow ---------- */
  var cars=0,water=0,drops=0;
  function setStat(){ document.getElementById('sCars').textContent=cars;
    document.getElementById('sWater').textContent=water; document.getElementById('sDrops').textContent=drops; }
  function say(t){ document.getElementById('bubble').textContent=t; speak(t); }

  var FACTS=[
    'Lavamos en seco, sin agua. ¡Así salvamos muchas gotitas! 💧',
    'Una manguera bota más de cien litros. ¡Nosotros casi nada!',
    'Cada paño tiene su trabajo: uno no sirve para todo.',
    'El barniz protege la pintura y la hace brillar.',
    'Cuidar el agua ayuda a todo el planeta.',
    'Las ruedas se llaman neumáticos. ¡Son cuatro!',
    'Un auto brillante se ve feliz, ¿no crees?'
  ];

  function stageDone(){
    if(ORDER[stageIndex]==='brillo'){ carDone(); return; }
    pop(); stageIndex++; setTimeout(function(){ buildStage(stageIndex); },350);
  }
  function carDone(){
    phase='done'; polishMode=false; polished=true; drawCar();
    gritX.clearRect(0,0,W,H); document.getElementById('tray').innerHTML='';
    cars++; water+=180; drops+=12; setStat(); cheer(); confetti();
    say('¡Auto brillando! 🎉 Ahorraste 180 litros de agua y salvaste 12 gotitas.');
    document.getElementById('controls').innerHTML=
      '<button class="btn go" id="nextBtn">Otro auto 🚗</button>'+
      '<button class="btn ghost" id="photoBtn">Mi foto 📷</button>';
    document.getElementById('nextBtn').onclick=function(){ photoImg=null; newCar();
      setTimeout(function(){ say(FACTS[(Math.random()*FACTS.length)|0]); },1200); };
    document.getElementById('photoBtn').onclick=function(){ document.getElementById('photoInput').click(); };
  }
  function newCar(){
    phase='play'; polished=false; stageIndex=0;
    if(!photoImg) carColor=COLORS[(Math.random()*COLORS.length)|0];
    document.getElementById('controls').innerHTML=
      '<button class="btn ghost" id="photoBtn">Mi foto 📷</button>';
    document.getElementById('photoBtn').onclick=function(){ document.getElementById('photoInput').click(); };
    drawCar(); buildStage(0);
  }

  function confetti(){ var em=['💧','✨','🫧','🚗','🌟','♻️'];
    for(var i=0;i<26;i++){ (function(){ var c=document.createElement('div'); c.className='confetti';
      c.textContent=em[(Math.random()*em.length)|0]; c.style.left=(Math.random()*100)+'vw';
      c.style.animationDuration=(2+Math.random()*1.8)+'s'; c.style.fontSize=(20+Math.random()*22)+'px';
      document.body.appendChild(c); setTimeout(function(){c.remove();},4200); })(); } }

  /* ---------- Photo ---------- */
  document.getElementById('photoInput').addEventListener('change',function(e){
    var f=e.target.files&&e.target.files[0]; if(!f)return; var rd=new FileReader();
    rd.onload=function(ev){ var im=new Image(); im.onload=function(){ photoImg=im; newCar(); };
      im.src=ev.target.result; }; rd.readAsDataURL(f); e.target.value=''; });

  /* ---------- Start ---------- */
  document.getElementById('playBtn').addEventListener('click',function(){
    ac(); if('speechSynthesis' in window){ try{ var w=new SpeechSynthesisUtterance(' '); w.lang='es-ES'; speechSynthesis.speak(w);}catch(e){} }
    document.getElementById('startScreen').classList.add('hidden');
    resize(); newCar(); cheer();
    setTimeout(function(){ say('¡Hola! Lavamos en seco, sin agua. ¡Empecemos! 💧'); },200);
  });
  window.addEventListener('resize',function(){ if(phase!=='start')resize(); });
  window.addEventListener('orientationchange',function(){ setTimeout(function(){ if(phase!=='start')resize(); },300); });
  setStat();
})();
</script>
</body>
</html>
