  <meta name="theme-color" content="#05070F">
  <link rel="icon" type="image/png" href="favicon-codata.png">
  <link rel="apple-touch-icon" href="favicon-codata.png">
  <!-- Vista previa al compartir el link (WhatsApp, Instagram, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="CO-DATA · Automatización, digitalización e IA">
  <meta property="og:description" content="Soluciones reales para tu negocio. Ve la demo antes de decidir. Empresa chilena.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05070F;--seg:#5B6CFF;--ink:#EEF1FB;--ink-2:#A7AECC;--ink-3:#666D8C;
    --line:rgba(255,255,255,.07);--line-2:rgba(255,255,255,.14);
    --display:'Space Grotesk',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;-webkit-tap-highlight-color:transparent;}
  h1,h2,h3{font-family:var(--display);letter-spacing:-.6px;line-height:1.1;font-weight:600;text-shadow:0 2px 7px rgba(5,7,15,.92);}
  svg{display:block;} button{font-family:inherit;cursor:pointer;}

  /* BOOT */
  #boot{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .9s ease;}
  #boot.hide{opacity:0;pointer-events:none;}
  .boot-inner{text-align:center;width:min(420px,86vw);}
  .boot-inner .bm{width:46px;height:46px;margin:0 auto 22px;animation:spin 3s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .boot-name{font-family:var(--display);font-weight:600;font-size:30px;letter-spacing:6px;color:var(--ink);}
  .boot-tag{font-family:var(--mono);font-size:10.5px;letter-spacing:3px;color:var(--ink-3);margin-top:8px;text-transform:uppercase;}
  .boot-bar{height:2px;background:rgba(255,255,255,.08);border-radius:2px;margin:26px 0 10px;overflow:hidden;}
  .boot-fill{height:100%;width:0;background:linear-gradient(90deg,var(--seg),#00E0C2);box-shadow:0 0 12px var(--seg);transition:width .2s linear;}
  .boot-status{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--seg);text-transform:uppercase;}

  #space{position:fixed;inset:0;width:100vw;height:100vh;z-index:0;}
  #wash{position:fixed;inset:0;z-index:1;pointer-events:none;transition:background 1.1s ease,opacity .3s ease;
    background:radial-gradient(85% 65% at 50% 36%,color-mix(in srgb,var(--seg) 26%,transparent),transparent 72%);}
  #wash.flash{opacity:1;filter:brightness(2.2);}
  #vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
    background:linear-gradient(180deg,rgba(5,7,15,.5),rgba(5,7,15,.22) 18%,rgba(5,7,15,.28) 82%,rgba(5,7,15,.72));}

  /* HUD */
  .hud{position:fixed;inset:0;z-index:2;pointer-events:none;}
  .hud .corner{position:absolute;width:26px;height:26px;border:1px solid rgba(255,255,255,.16);}
  .hud .tl{top:16px;left:16px;border-right:0;border-bottom:0;}
  .hud .tr{top:16px;right:16px;border-left:0;border-bottom:0;}
  .hud .bl{bottom:16px;left:16px;border-right:0;border-top:0;}
  .hud .br{bottom:16px;right:16px;border-left:0;border-top:0;}
  .hud .tele{position:absolute;bottom:20px;left:52px;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.28);text-transform:uppercase;}
  .hud .scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,224,194,.4),transparent);animation:scan 7s linear infinite;opacity:.5;}
  @keyframes scan{0%{top:-2%}100%{top:102%}}

  .app{position:relative;z-index:3;min-height:100vh;display:flex;flex-direction:column;opacity:0;transition:opacity 1s ease .2s;}
  .app.ready{opacity:1;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 32px;gap:16px;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo .mark{width:30px;height:30px;}
  .logo b{font-family:var(--display);font-weight:600;font-size:16px;letter-spacing:1px;}
  .logo span{font-family:var(--mono);font-size:8.5px;letter-spacing:2.5px;color:var(--ink-3);display:block;margin-top:-1px;text-transform:uppercase;}
  .nation{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-2);border:1px solid var(--line);padding:8px 16px;border-radius:999px;background:rgba(10,13,26,.4);backdrop-filter:blur(10px);}
  .nation .dot{width:7px;height:7px;border-radius:50%;background:#00E0C2;box-shadow:0 0 10px #00E0C2;}
  .back{display:none;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;letter-spacing:.5px;color:var(--ink-2);background:transparent;border:1px solid var(--line-2);padding:9px 16px;border-radius:10px;transition:.22s;}
  .back:hover{background:rgba(255,255,255,.05);color:var(--ink);} .back svg{width:15px;height:15px;}

  .screen{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 32px 90px;opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease;}
  .screen.in{opacity:1;transform:none;}
  .wrap{max-width:1160px;margin:0 auto;width:100%;}

  .home-h{text-align:center;margin-bottom:54px;}
  .eye{font-family:var(--mono);font-size:11px;letter-spacing:3.5px;text-transform:uppercase;color:color-mix(in srgb,var(--seg) 64%,white);font-weight:500;}
  .home-h h1{font-size:clamp(32px,5.2vw,54px);margin:18px 0 16px;font-weight:600;}
  .home-h p{font-size:16px;color:var(--ink-2);max-width:52ch;margin:0 auto;font-weight:300;}
  .segs{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
  .seg{background:rgba(10,13,26,.5);border:1px solid var(--line);border-radius:18px;padding:30px 22px;backdrop-filter:blur(16px);transition:.3s cubic-bezier(.2,.7,.2,1);}
  .seg:hover{transform:translateY(-6px);border-color:color-mix(in srgb,var(--c) 55%,transparent);box-shadow:0 20px 50px color-mix(in srgb,var(--c) 14%,transparent);}
  .seg .ibox{width:50px;height:50px;border-radius:14px;border:1px solid color-mix(in srgb,var(--c) 40%,var(--line-2));display:grid;place-items:center;color:var(--c);margin-bottom:18px;transition:.3s;}
  .seg:hover .ibox{background:color-mix(in srgb,var(--c) 12%,transparent);}
  .seg .ibox svg{width:24px;height:24px;}
  .seg h3{font-size:17px;margin-bottom:8px;font-weight:600;}
  .seg p{font-size:12.5px;color:var(--ink-2);font-weight:300;min-height:54px;}
  .seg .go{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--c);margin-top:14px;}
  .seg .go svg{width:13px;height:13px;}

  .seg-head{margin-bottom:36px;max-width:720px;}
  .seg-head .crumb{display:flex;align-items:center;gap:10px;color:var(--seg);margin-bottom:18px;}
  .seg-head .crumb .ibox{width:38px;height:38px;border-radius:11px;border:1px solid color-mix(in srgb,var(--seg) 40%,var(--line-2));display:grid;place-items:center;}
  .seg-head .crumb .ibox svg{width:20px;height:20px;}
  .seg-head .crumb .lab{font-family:var(--mono);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;}
  .seg-head h2{font-size:clamp(26px,4.2vw,42px);margin-bottom:14px;max-width:20ch;font-weight:600;}
  .seg-head p{font-size:16px;color:var(--ink-2);max-width:58ch;font-weight:300;}
  .sol-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .sol{background:rgba(10,13,26,.55);border:1px solid var(--line);border-radius:16px;padding:24px;backdrop-filter:blur(16px);transition:.26s;cursor:pointer;display:flex;flex-direction:column;}
  .sol:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--seg) 50%,transparent);background:rgba(15,19,36,.62);}
  .sol .badge{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--seg);border:1px solid color-mix(in srgb,var(--seg) 40%,transparent);padding:3px 9px;border-radius:999px;align-self:flex-start;margin-bottom:14px;}
  .sol h3{font-size:16.5px;margin-bottom:9px;font-weight:600;line-height:1.25;}
  .sol .q{font-size:13px;color:var(--ink-2);font-weight:300;margin-bottom:16px;}
  .sol .ret{display:flex;align-items:center;gap:8px;margin-top:auto;font-family:var(--mono);font-size:11px;color:color-mix(in srgb,var(--seg) 70%,white);}
  .sol .ret svg{width:14px;height:14px;flex:0 0 auto;}
  .sol .more{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-3);margin-top:14px;transition:.2s;}
  .sol:hover .more{color:var(--seg);} .sol .more svg{width:12px;height:12px;}

  .modal-bg{position:fixed;inset:0;z-index:60;background:rgba(2,3,8,.74);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px;}
  .modal-bg.open{display:flex;animation:fade .3s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#080B16;border:1px solid var(--line-2);border-radius:22px;max-width:540px;width:100%;padding:34px;position:relative;box-shadow:0 40px 90px rgba(0,0,0,.65);}
  .modal .x{position:absolute;top:20px;right:22px;background:none;border:none;color:var(--ink-3);transition:.2s;} .modal .x:hover{color:var(--ink);} .modal .x svg{width:20px;height:20px;}
  .modal .tag{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--seg);}
  .modal h3{font-size:23px;margin:10px 0 22px;font-weight:600;}
  .modal .blk{margin-bottom:16px;} .modal .blk .l{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px;} .modal .blk p{font-size:14.5px;color:var(--ink);font-weight:300;}
  .modal .ret-box{display:flex;align-items:center;gap:13px;background:color-mix(in srgb,var(--seg) 12%,#080B16);border:1px solid color-mix(in srgb,var(--seg) 32%,transparent);border-radius:14px;padding:16px 18px;margin:20px 0;}
  .modal .ret-box .ic{color:var(--seg);} .modal .ret-box .ic svg{width:24px;height:24px;}
  .modal .ret-box .l{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:color-mix(in srgb,var(--seg) 70%,white);}
  .modal .ret-box .v{font-family:var(--display);font-weight:600;font-size:18px;margin-top:2px;}
  .acts{display:flex;gap:11px;margin-top:8px;}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--mono);font-size:13px;font-weight:500;padding:15px;border-radius:12px;border:1px solid transparent;text-decoration:none;transition:.2s;} .btn svg{width:16px;height:16px;}
  .btn-demo{background:transparent;border-color:var(--line-2);color:var(--ink);} .btn-demo:hover{background:rgba(255,255,255,.05);}
  .btn-coti{background:var(--seg);color:#05070F;} .btn-coti:hover{filter:brightness(1.08);transform:translateY(-1px);}
  .modal .nudge{font-size:11.5px;color:var(--ink-3);text-align:center;margin-top:14px;font-weight:300;}

  .wa{position:fixed;bottom:26px;right:26px;z-index:50;display:flex;align-items:center;gap:9px;background:rgba(10,13,26,.7);backdrop-filter:blur(10px);color:var(--ink);font-family:var(--mono);font-size:12px;letter-spacing:.5px;padding:12px 18px;border:1px solid var(--line-2);border-radius:999px;transition:.2s;text-decoration:none;} .wa:hover{transform:translateY(-2px);border-color:var(--ink);} .wa svg{width:16px;height:16px;}

  @media (max-width:900px){.segs{grid-template-columns:1fr 1fr;}.sol-grid{grid-template-columns:1fr;}.seg p{min-height:0;}.topbar{flex-wrap:wrap;}.nation{order:3;font-size:9px;letter-spacing:1.2px;padding:6px 12px;}}
  @media (max-width:520px){.segs{grid-template-columns:1fr;}.topbar{padding:16px 18px;}.screen{padding:18px 18px 80px;}.hud .tele{display:none;}.boot-name{font-size:24px;letter-spacing:4px;}.boot-tag{font-size:8px;letter-spacing:1.4px;}.modal{padding:24px;}.nation{width:100%;justify-content:center;}.home-h{margin-bottom:38px;}}
  @media (prefers-reduced-motion:reduce){.screen,.app,.modal-bg{transition:none;animation:none;}.bm,.hud .scan{animation:none;}}
  /* ASISTENTE IA */
  .asist-btn{position:fixed;bottom:24px;right:24px;z-index:55;display:flex;align-items:center;gap:9px;background:linear-gradient(120deg,var(--seg),#00C2A8);color:#05070F;font-family:var(--mono);font-size:12.5px;font-weight:600;letter-spacing:.5px;padding:13px 18px;border:none;border-radius:999px;box-shadow:0 12px 34px color-mix(in srgb,var(--seg) 40%,transparent);transition:.25s;}
  .asist-btn:hover{transform:translateY(-2px);} .asist-btn svg{width:18px;height:18px;}
  .asist-btn .ping{position:absolute;top:-3px;right:-3px;width:11px;height:11px;border-radius:50%;background:#FF6B5E;animation:ping 1.8s infinite;}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(255,107,94,.5)}70%{box-shadow:0 0 0 9px rgba(255,107,94,0)}100%{box-shadow:0 0 0 0 rgba(255,107,94,0)}}
  .asist-panel{position:fixed;bottom:24px;right:24px;z-index:56;width:min(380px,92vw);height:min(560px,80vh);background:#080B16;border:1px solid var(--line-2);border-radius:22px;box-shadow:0 30px 80px rgba(0,0,0,.6);display:none;flex-direction:column;overflow:hidden;}
  .asist-panel.open{display:flex;animation:slideup .3s ease;}
  @keyframes slideup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .asist-head{display:flex;align-items:center;gap:11px;padding:15px 18px;border-bottom:1px solid var(--line);}
  .asist-head .av{width:34px;height:34px;border-radius:10px;background:linear-gradient(120deg,var(--seg),#00C2A8);display:grid;place-items:center;color:#05070F;flex:0 0 auto;} .asist-head .av svg{width:18px;height:18px;}
  .asist-head .ti b{font-size:14px;font-family:var(--display);} .asist-head .ti span{font-family:var(--mono);font-size:8.5px;letter-spacing:1px;text-transform:uppercase;color:#00E0C2;display:block;}
  .asist-head .cl{margin-left:auto;background:none;border:none;color:var(--ink-3);} .asist-head .cl svg{width:18px;height:18px;}
  .asist-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:11px;}
  .msg{max-width:88%;font-size:13.5px;line-height:1.5;padding:11px 14px;border-radius:14px;font-weight:300;}
  .msg.bot{background:rgba(255,255,255,.05);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px;}
  .msg.user{background:var(--seg);color:#05070F;align-self:flex-end;border-bottom-right-radius:4px;font-weight:500;}
  .msg.typing{display:flex;gap:4px;} .msg.typing i{width:6px;height:6px;border-radius:50%;background:var(--ink-3);animation:blink 1.2s infinite;}
  .msg.typing i:nth-child(2){animation-delay:.2s}.msg.typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
  .rec{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:13px;align-self:stretch;}
  .rec .rn{font-family:var(--display);font-weight:600;font-size:14px;}
  .rec .rb{font-size:12.5px;color:var(--ink-2);margin:4px 0 8px;font-weight:300;}
  .rec .rr{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:color-mix(in srgb,var(--seg) 78%,white);margin-bottom:10px;} .rec .rr svg{width:13px;height:13px;flex:0 0 auto;}
  .rec-go{width:100%;background:var(--seg);color:#05070F;border:none;border-radius:9px;padding:9px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;padding:0 18px 12px;}
  .chip{background:rgba(255,255,255,.05);border:1px solid var(--line-2);color:var(--ink);font-family:var(--body);font-size:12.5px;padding:8px 13px;border-radius:999px;transition:.2s;}
  .chip:hover{background:color-mix(in srgb,var(--seg) 20%,transparent);border-color:var(--seg);}
  .asist-input{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);}
  .asist-input input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--line-2);border-radius:11px;padding:11px 13px;color:var(--ink);font-family:var(--body);font-size:13px;outline:none;} .asist-input input::placeholder{color:var(--ink-3);}
  .asist-input button{background:var(--seg);border:none;border-radius:11px;width:42px;display:grid;place-items:center;color:#05070F;flex:0 0 auto;} .asist-input button svg{width:18px;height:18px;}
  .range-box{background:color-mix(in srgb,var(--seg) 10%,#080B16);border:1px solid color-mix(in srgb,var(--seg) 32%,transparent);border-radius:14px;padding:16px;margin-top:14px;animation:slideup .3s ease;}
  .range-box .rb-l{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:color-mix(in srgb,var(--seg) 72%,white);}
  .range-box .rb-v{font-family:var(--display);font-weight:600;font-size:17px;margin:5px 0 8px;}
  .range-box .rb-n{font-size:11.5px;color:var(--ink-3);margin-bottom:13px;font-weight:300;}
  @media (max-width:520px){.asist-panel{bottom:0;right:0;left:0;width:100%;height:84vh;border-radius:22px 22px 0 0;}.asist-btn{bottom:16px;right:16px;}}

  /* ---- exploración por categorías + buscador ---- */
  .search-box{display:flex;align-items:center;gap:10px;max-width:580px;margin:0 auto 36px;background:rgba(10,13,26,.6);border:1px solid var(--line-2);border-radius:14px;padding:4px 6px 4px 16px;backdrop-filter:blur(14px);}
  .search-box .si{color:var(--ink-3);display:flex;} .search-box .si svg{width:18px;height:18px;}
  .search-box input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-family:var(--body);font-size:15px;padding:13px 8px;}
  .search-box input::placeholder{color:var(--ink-3);}
  .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  	.cat-tile{background:rgba(6,8,15,.72);border:1px solid var(--line);border-radius:18px;padding:24px;cursor:pointer;transition:.28s cubic-bezier(.2,.7,.2,1);position:relative;overflow:hidden;}
  .cat-tile::before{content:"";position:absolute;inset:0;background:radial-gradient(75% 60% at 18% 0%,var(--cc),transparent 70%);opacity:.14;transition:.28s;}
  .cat-tile:hover{transform:translateY(-5px);border-color:var(--cc);box-shadow:0 18px 44px color-mix(in srgb,var(--cc) 16%,transparent);}
  .cat-tile:hover::before{opacity:.3;}
  .cat-tile .cat-ic{position:relative;width:46px;height:46px;border-radius:13px;border:1px solid color-mix(in srgb,var(--cc) 45%,var(--line-2));display:grid;place-items:center;color:var(--cc);margin-bottom:16px;} .cat-tile .cat-ic svg{width:23px;height:23px;}
  .cat-tile .cat-l{position:relative;font-family:var(--display);font-weight:600;font-size:17px;}
  .cat-tile .cat-n{position:relative;font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3);margin-top:6px;}
  .sol{border-top:2px solid var(--cc,rgba(255,255,255,.07));}
  .sol-tag{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;}
  .res-head{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);margin-bottom:16px;}

  function lab(){function step(n,t,d){return '<div class="lab-step"><div class="ls-n">'+n+'</div><div><div class="ls-t">'+t+'</div><div class="ls-d">'+d+'</div></div></div>';}

// ===== BOOT SEQUENCE =====
(function(){
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var boot=document.getElementById('boot'), fill=document.getElementById('bootFill'), st=document.getElementById('bootStatus');
  var nm=document.getElementById('bootName'), tg=document.getElementById('bootTag');
  function scramble(el,final,dur){
    var chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789·#@%", start=Date.now();
    var iv=setInterval(function(){
      var p=Math.min((Date.now()-start)/dur,1), out="";
      for(var i=0;i<final.length;i++){ out += (i/final.length<p || final[i]===' ')?final[i]:chars[Math.floor(Math.random()*chars.length)]; }
      el.textContent=out; if(p>=1)clearInterval(iv);
    },45);
  }
  function done(){ boot.classList.add('hide'); document.getElementById('app').classList.add('ready'); }
  if(reduce){ done(); return; }
  scramble(nm,"CO-DATA",700); setTimeout(function(){scramble(tg,"EMPRESA CHILENA DE DIGITALIZACIÓN",900);},300);
  var stages=["INICIALIZANDO SISTEMA","CARGANDO MOTORES","CONECTANDO NODOS","SISTEMA LISTO"], si=0;
  var t0=Date.now(), DUR=2100;
  var iv=setInterval(function(){
    var p=Math.min((Date.now()-t0)/DUR,1); fill.style.width=(p*100)+"%";
    var ns=Math.min(stages.length-1,Math.floor(p*stages.length)); if(ns!==si){si=ns;st.textContent=stages[si];}
    if(p>=1){clearInterval(iv); setTimeout(done,260);}
  },50);
  boot.addEventListener('click',function(){clearInterval(iv);done();});
})();

// ===== UNIVERSE (enveloping + network core) =====
(function(){
  if(typeof THREE==='undefined'){document.getElementById('space').style.display='none';return;}
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var canvas=document.getElementById('space');
  var rn=new THREE.WebGLRenderer({canvas:canvas,alpha:true,antialias:true});
  rn.setPixelRatio(Math.min(devicePixelRatio,innerWidth<760?1.5:2));
  var sc=new THREE.Scene(), cam=new THREE.PerspectiveCamera(64,innerWidth/innerHeight,.1,3000);
  cam.position.set(0,0,reduce?60:150);
  var look=new THREE.Group(); sc.add(look);

  // enveloping starfield (sphere shell around camera)
  var N=innerWidth<760?1500:5000, sp=new Float32Array(N*3), sco=new Float32Array(N*3), ssc=new Float32Array(N);
  var cB=new THREE.Color(0x5B6CFF),cT=new THREE.Color(0x00E0C2),cV=new THREE.Color(0x8B5CF6),cW=new THREE.Color(0xCFE0FF);
  for(var i=0;i<N;i++){
    var u=Math.random(),v=Math.random(),th=u*Math.PI*2,ph=Math.acos(2*v-1),r=46+Math.random()*46;
    sp[i*3]=r*Math.sin(ph)*Math.cos(th); sp[i*3+1]=r*Math.sin(ph)*Math.sin(th); sp[i*3+2]=r*Math.cos(ph);
    var c=cB.clone().lerp(cT,Math.random()*.6); if(Math.random()<.1)c=cV.clone(); if(Math.random()<.15)c=cW.clone();
    sco[i*3]=c.r;sco[i*3+1]=c.g;sco[i*3+2]=c.b; ssc[i]=Math.random()*1.3+.4;
  }
  var sg=new THREE.BufferGeometry();
  sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
  sg.setAttribute('aColor',new THREE.BufferAttribute(sco,3));
  sg.setAttribute('aScale',new THREE.BufferAttribute(ssc,1));
  var uni={uTime:{value:0},uSize:{value:innerWidth<760?1.5:1.9},uOpacity:{value:0}};
  var smat=new THREE.ShaderMaterial({uniforms:uni,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
    vertexShader:'attribute vec3 aColor;attribute float aScale;uniform float uTime;uniform float uSize;varying vec3 vC;void main(){vC=aColor;vec3 p=position;p.x+=sin(uTime*.2+position.y*.3)*.4;p.y+=cos(uTime*.18+position.x*.3)*.4;vec4 mv=modelViewMatrix*vec4(p,1.);gl_PointSize=aScale*uSize*(320./-mv.z);gl_Position=projectionMatrix*mv;}',
    fragmentShader:'precision mediump float;varying vec3 vC;uniform float uOpacity;void main(){vec2 c=gl_PointCoord-.5;float d=length(c);if(d>.5)discard;float a=smoothstep(.5,0.,d);gl_FragColor=vec4(vC,a*uOpacity);}'});
  look.add(new THREE.Points(sg,smat));

  // network core (nodes + connecting lines)
  var H=innerWidth<760?100:300, hp=[];
  for(var j=0;j<H;j++){ hp.push((Math.random()-.5)*52,(Math.random()-.5)*38,(Math.random()-.5)*52); }
  var hpos=new Float32Array(hp), hsc=new Float32Array(H), hco=new Float32Array(H*3);
  for(var j=0;j<H;j++){ hsc[j]=Math.random()*1.6+1; var c=cT.clone().lerp(cB,Math.random()); hco[j*3]=c.r;hco[j*3+1]=c.g;hco[j*3+2]=c.b; }
  var hg=new THREE.BufferGeometry();
  hg.setAttribute('position',new THREE.BufferAttribute(hpos,3));
  hg.setAttribute('aColor',new THREE.BufferAttribute(hco,3));
  hg.setAttribute('aScale',new THREE.BufferAttribute(hsc,1));
  var hmat=new THREE.ShaderMaterial({uniforms:uni,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,vertexShader:smat.vertexShader,fragmentShader:smat.fragmentShader});
  look.add(new THREE.Points(hg,hmat));
  // lines
  var lp=[],thr=15;
  for(var a=0;a<H;a++)for(var b=a+1;b<H;b++){var dx=hp[a*3]-hp[b*3],dy=hp[a*3+1]-hp[b*3+1],dz=hp[a*3+2]-hp[b*3+2];if(Math.sqrt(dx*dx+dy*dy+dz*dz)<thr){lp.push(hp[a*3],hp[a*3+1],hp[a*3+2],hp[b*3],hp[b*3+1],hp[b*3+2]);}}
  var lg=new THREE.BufferGeometry(); lg.setAttribute('position',new THREE.Float32BufferAttribute(lp,3));
  var lmat=new THREE.LineBasicMaterial({color:0x5B6CFF,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
  look.add(new THREE.LineSegments(lg,lmat));

  var mx=0,my=0; addEventListener('mousemove',function(e){mx=e.clientX/innerWidth-.5;my=e.clientY/innerHeight-.5;}); addEventListener('touchmove',function(e){var t=e.touches[0];if(t){mx=t.clientX/innerWidth-.5;my=t.clientY/innerHeight-.5;}},{passive:true});
  function rs(){rn.setSize(innerWidth,innerHeight,false);cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();} rs(); addEventListener('resize',rs);

  var camz=reduce?60:150, opTarget=.62;
  window.warp=function(){ camz+=14; }; // pequeño empuje al cambiar de perfil

  function loop(){
    uni.uTime.value+=.015;
    camz+=(38-camz)*.035;
    cam.position.z=camz;
    cam.position.x+=(mx*10-cam.position.x)*.03; cam.position.y+=(-my*8-cam.position.y)*.03; cam.lookAt(0,0,0);
    look.rotation.y+=.0004; look.rotation.x+=(my*.18-look.rotation.x)*.02; look.rotation.y+=(mx*.0009);
    if(uni.uOpacity.value<opTarget)uni.uOpacity.value+=.006;
    var pulse=.10+Math.sin(uni.uTime.value*1.1)*.05; lmat.opacity=Math.min(pulse,uni.uOpacity.value*.3);
    rn.render(sc,cam);
    if(!reduce)requestAnimationFrame(loop);
  }
  loop(); if(reduce){uni.uOpacity.value=opTarget;lmat.opacity=.1;cam.position.z=60;rn.render(sc,cam);}
})();
</script>
