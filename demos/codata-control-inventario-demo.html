<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Inventario · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#0B6E99;--accent-ink:#fff;--ok:#2E9E66;--warn:#E0A53B;--bad:#E0533D;
    --ink:#121A1E;--muted:#6F7A80;--line:#E4EBEE;--surface:#F2F6F8;--card:#fff;
    --display:"Bricolage Grotesque",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;--mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);color:var(--ink);background:var(--surface);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  .shell{max-width:1020px;margin:0 auto;padding:24px 20px 50px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:11px}
  .logo .m{width:36px;height:36px;border-radius:10px;background:var(--accent);display:grid;place-items:center;color:var(--accent-ink);font-family:var(--display);font-weight:800;font-size:17px;transition:background .35s}
  .logo b{font-family:var(--display);font-size:19px;display:block;line-height:1}.logo span{font-size:11.5px;color:var(--muted)}
  .controls{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .ti{height:36px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:0 11px;font-size:13px;width:120px;outline:none}
  .swatches{display:flex;gap:6px}.sw{width:22px;height:22px;border-radius:999px;border:2px solid transparent}.sw.active{border-color:var(--ink);transform:scale(1.1)}
  .lead{margin:0 0 16px}.lead h1{font-family:var(--display);font-weight:800;font-size:clamp(22px,3vw,30px);letter-spacing:-.02em;margin:0 0 4px}
  .lead p{font-size:14px;color:var(--muted);margin:0;max-width:58ch}
  .bars{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 16px;flex:1;min-width:120px}
  .kpi b{font-family:var(--display);font-size:20px;display:block;line-height:1}.kpi span{font-size:11.5px;color:var(--muted)}
  .kpi.warn b{color:var(--warn)}.kpi.bad b{color:var(--bad)}
  .search{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .search input{flex:1;min-width:180px;height:44px;border:1px solid var(--line);border-radius:12px;padding:0 14px;font-size:14px;outline:none;background:var(--card)}
  .search input:focus{border-color:var(--accent)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 22px rgba(20,18,30,.05)}
  .row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .row:last-child{border:none}
  .row .qr{width:38px;height:38px;border:1px solid var(--line);border-radius:9px;display:grid;place-items:center;flex:0 0 auto;cursor:pointer;background:#fff}
  .row .qr svg{width:30px;height:30px}
  .row .inf{flex:1;min-width:0}.row .inf b{font-size:14px;display:block}.row .inf span{font-size:11.5px;color:var(--muted)}
  .stock{text-align:center;min-width:64px}
  .stock .n{font-family:var(--mono);font-weight:700;font-size:18px;line-height:1}
  .stock .badge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:999px}
  .b-ok{background:color-mix(in srgb,var(--ok) 14%,transparent);color:var(--ok)}
  .b-warn{background:color-mix(in srgb,var(--warn) 18%,transparent);color:#9A6A12}
  .b-bad{background:color-mix(in srgb,var(--bad) 14%,transparent);color:var(--bad)}
  .mv{display:flex;gap:6px}
  .mv button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);font-size:18px;font-weight:700;color:var(--ink);transition:.12s}
  .mv button:hover{border-color:var(--accent);color:var(--accent)}
  .ov{position:fixed;inset:0;background:rgba(18,26,30,.5);display:none;place-items:center;z-index:50;padding:20px}
  .ov.on{display:grid}
  .qrcard{background:var(--card);border-radius:18px;padding:26px;text-align:center;max-width:280px}
  .qrcard .big{width:160px;height:160px;background:#fff;border:1px solid var(--line);border-radius:14px;display:grid;place-items:center;margin:0 auto 12px}
  .qrcard .big svg{width:134px;height:134px}
  .qrcard b{font-size:15px}.qrcard .code{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:4px}
  .qrcard button{margin-top:14px;height:42px;width:100%;border-radius:11px;background:var(--accent);color:var(--accent-ink);font-weight:700}
  .credit{text-align:center;font-size:12px;color:var(--muted);margin-top:22px}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="logo"><div class="m" id="lm">B</div><div><b id="bl">Bodega</b><span>Control de inventario · demo</span></div></div>
    <div class="controls"><input class="ti" id="ib" value="Bodega" maxlength="16"><div class="swatches" id="sw"></div></div>
  </div>
  <div class="lead"><h1>Sabes qué tienes, qué falta y dónde está</h1>
    <p>Stock en vivo, alertas cuando algo llega al mínimo, movimientos de entrada/salida y un QR por ítem.</p></div>

  <div class="bars">
    <div class="kpi"><b id="kItems">0</b><span>ítems</span></div>
    <div class="kpi warn"><b id="kLow">0</b><span>bajo mínimo</span></div>
    <div class="kpi bad"><b id="kOut">0</b><span>agotados</span></div>
    <div class="kpi"><b id="kUnits">0</b><span>unidades totales</span></div>
  </div>

  <div class="search"><input id="q" placeholder="Buscar herramienta o insumo…"></div>
  <div class="panel" id="list"></div>
  <div class="credit">Demo interactiva · solución re-skineable · inventario de ejemplo</div>
</div>

<div class="ov" id="ov"><div class="qrcard" id="qrcard"></div></div>

<script>
(function(){
  "use strict";
  function $(s){return document.querySelector(s);}
  var items=[
    {n:"Taladro percutor",cat:"Herramienta eléctrica",stock:4,min:2,code:"HE-001"},
    {n:"Casco de seguridad",cat:"EPP",stock:6,min:10,code:"EP-014"},
    {n:"Guantes anticorte",cat:"EPP",stock:0,min:8,code:"EP-022"},
    {n:"Cinta de demarcación",cat:"Insumo",stock:23,min:5,code:"IN-101"},
    {n:"Esmeril angular",cat:"Herramienta eléctrica",stock:2,min:2,code:"HE-007"},
    {n:"Arnés de altura",cat:"EPP",stock:3,min:4,code:"EP-031"},
    {n:"Disco de corte",cat:"Insumo",stock:48,min:20,code:"IN-118"},
    {n:"Llave de impacto",cat:"Herramienta eléctrica",stock:1,min:1,code:"HE-012"}
  ];
  var q="";
  function status(it){if(it.stock===0)return["bad","Agotado"];if(it.stock<=it.min)return["warn","Bajo"];return["ok","OK"];}

  function qrSvg(code){var c="",g=9,s=14,seed=code.length*37+99;for(var y=0;y<g;y++)for(var x=0;x<g;x++){seed=(seed*1103515245+12345)&0x7fffffff;if((seed>>6)%2===0)c+='<rect x="'+(x*s)+'" y="'+(y*s)+'" width="'+s+'" height="'+s+'" fill="#121A1E"/>';}
    function cor(a,b){return '<rect x="'+a+'" y="'+b+'" width="34" height="34" fill="#121A1E"/><rect x="'+(a+5)+'" y="'+(b+5)+'" width="24" height="24" fill="#fff"/><rect x="'+(a+11)+'" y="'+(b+11)+'" width="12" height="12" fill="#121A1E"/>';}
    return '<svg viewBox="0 0 126 126">'+c+cor(0,0)+cor(92,0)+cor(0,92)+'</svg>';}

  function render(){
    var arr=items.filter(function(it){return (it.n+" "+it.cat+" "+it.code).toLowerCase().indexOf(q.toLowerCase())>=0;});
    $("#list").innerHTML=arr.map(function(it){var i=items.indexOf(it);var st=status(it);
      return '<div class="row"><div class="qr" data-qr="'+i+'">'+qrSvg(it.code)+'</div>'+
        '<div class="inf"><b>'+it.n+'</b><span>'+it.cat+' · '+it.code+' · mín '+it.min+'</span></div>'+
        '<div class="stock"><div class="n">'+it.stock+'</div><span class="badge b-'+st[0]+'">'+st[1]+'</span></div>'+
        '<div class="mv"><button data-mv="'+i+'" data-d="-1">−</button><button data-mv="'+i+'" data-d="1">+</button></div></div>';
    }).join("")||'<div style="padding:26px;text-align:center;color:var(--muted);font-size:13.5px">Sin resultados</div>';
    [].slice.call($("#list").querySelectorAll("[data-mv]")).forEach(function(b){b.onclick=function(){var it=items[+b.dataset.mv];it.stock=Math.max(0,it.stock+ +b.dataset.d);render();};});
    [].slice.call($("#list").querySelectorAll("[data-qr]")).forEach(function(b){b.onclick=function(){openQR(items[+b.dataset.qr]);};});
    stats();
  }
  function stats(){
    $("#kItems").textContent=items.length;
    $("#kLow").textContent=items.filter(function(i){return i.stock>0&&i.stock<=i.min;}).length;
    $("#kOut").textContent=items.filter(function(i){return i.stock===0;}).length;
    $("#kUnits").textContent=items.reduce(function(a,i){return a+i.stock;},0);
  }
  function openQR(it){$("#qrcard").innerHTML='<div class="big">'+qrSvg(it.code)+'</div><b>'+it.n+'</b><div class="code">'+it.code+'</div><button id="qx">Cerrar</button>';$("#ov").classList.add("on");$("#qx").onclick=function(){$("#ov").classList.remove("on");};}
  $("#ov").onclick=function(e){if(e.target===$("#ov"))$("#ov").classList.remove("on");};
  $("#q").addEventListener("input",function(e){q=e.target.value;render();});

  var SW=[{c:"#0B6E99"},{c:"#0D9488"},{c:"#7C3AED"},{c:"#C2410C"},{c:"#16161A"}];
  function ac(o){document.documentElement.style.setProperty("--accent",o.c);var h=o.c.replace("#",""),r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    document.documentElement.style.setProperty("--accent-ink",(0.299*r+0.587*g+0.114*b)>150?"#121A1E":"#fff");
    [].slice.call(document.querySelectorAll(".sw")).forEach(function(e){e.classList.toggle("active",e.dataset.c===o.c);});}
  function bsw(){var s=$("#sw");s.innerHTML="";SW.forEach(function(o){var b=document.createElement("button");b.className="sw";b.style.background=o.c;b.dataset.c=o.c;b.onclick=function(){ac(o);};s.appendChild(b);});}
  function ab(n){$("#bl").textContent=n||"Marca";$("#lm").textContent=(n||"M").charAt(0).toUpperCase();}
  $("#ib").addEventListener("input",function(e){ab(e.target.value);});
  bsw();ac(SW[0]);ab("Bodega");render();
})();
</script>
</body>
</html>
